template:
  id: e-sklep-b2b
  name: Comarch e-Sklep B2B
  version: 1.0

project:
  type: implementation

  product: Comarch e-Sklep B2B

  description: >
    Впровадження платформи Comarch e-Sklep B2B, налаштування інтеграції
    з Comarch ERP Optima, підготовка даних, конфігурація системи,
    тестування, навчання користувачів і введення в промислову експлуатацію.

  objective: >
    Передати замовнику повністю працездатну систему
    Comarch e-Sklep B2B, інтегровану з Comarch ERP Optima
    і готову до використання в щоденній роботі.

  default_duration_weeks: 12

milestones:

  - id: M1
    name: Аналіз вимог
    description: >
      Визначення бізнес-вимог, функціональних вимог,
      вимог до інтеграцій і даних ERP, підготовка
      та узгодження специфікації проєкту.

    wbs:

      - id: WBS-1.1
        name: Аналіз бізнес-процесів
        description: >
          Визначення бізнес-процесів замовника,
          які будуть реалізовані в e-Sklep.

      - id: WBS-1.2
        name: Аналіз функціональних вимог
        description: >
          Визначення необхідних функцій e-Sklep
          і B2B.

      - id: WBS-1.3
        name: Аналіз інтеграцій
        description: >
          Визначення необхідних інтеграцій
          з ERP та зовнішніми сервісами.

      - id: WBS-1.4
        name: Аналіз вихідних даних
        description: >
          Оцінка готовності даних ERP
          до публікації в e-Sklep.

      - id: WBS-1.5
        name: Підготовка специфікації проєкту
        description: >
          Формування та узгодження
          специфікації проєкту.

  - id: M2
    name: Підготовка ERP
    description: >
      Підготовка Comarch ERP Optima
      до інтеграції з Comarch e-Sklep.

    wbs:

      - id: WBS-2.1
        name: Підготовка Comarch ERP Optima до інтеграції
        description: >
          Перевірка та налаштування ERP
          для роботи з e-Sklep.

      - id: WBS-2.2
        name: Налаштування інтеграції e-Sklep
        description: >
          Створення підключення магазину
          в Comarch ERP Optima.

      - id: WBS-2.3
        name: Налаштування параметрів обміну
        description: >
          Налаштування параметрів
          синхронізації даних.

      - id: WBS-2.4
        name: Підготовка до підключення e-Sklep
        description: >
          Перевірка готовності
          до підключення магазину.

  - id: M3
    name: Підключення e-Sklep
    description: >
      Підключення Comarch e-Sklep
      до Comarch ERP Optima.

    wbs:

      - id: WBS-3.1
        name: Підключення e-Sklep до ERP
        description: >
          Створення підключення
          між ERP та e-Sklep.

      - id: WBS-3.2
        name: Налаштування параметрів підключення
        description: >
          Налаштування параметрів
          підключення магазину.

      - id: WBS-3.3
        name: Перевірка підключення
        description: >
          Перевірка коректності
          підключення магазину.

  - id: M4
    name: Налаштування e-Sklep
    description: >
      Базове налаштування магазину
      без налаштування функцій B2B.

    wbs:

      - id: WBS-4.1
        name: Налаштування загальних параметрів магазину
        description: >
          Налаштування основних параметрів e-Sklep.

      - id: WBS-4.2
        name: Налаштування зовнішнього вигляду магазину
        description: >
          Налаштування шаблону
          та оформлення магазину.

      - id: WBS-4.3
        name: Налаштування способів оплати
        description: >
          Налаштування способів оплати.

      - id: WBS-4.4
        name: Налаштування способів доставки
        description: >
          Налаштування способів доставки.

      - id: WBS-4.5
        name: Налаштування сповіщень і параметрів магазину
        description: >
          Налаштування сповіщень
          і загальних параметрів магазину.

  - id: M5
    name: Підготовка даних
    description: >
      Підготовка даних ERP
      до публікації в e-Sklep.

    wbs:

      - id: WBS-5.1
        name: Підготовка товарів
        description: >
          Підготовка карток товарів
          до публікації.

      - id: WBS-5.2
        name: Підготовка структури каталогу
        description: >
          Підготовка категорій,
          груп і структури каталогу.

      - id: WBS-5.3
        name: Підготовка описів і мультимедіа
        description: >
          Підготовка описів,
          фотографій та інших матеріалів.

      - id: WBS-5.4
        name: Підготовка атрибутів і даних
        description: >
          Підготовка атрибутів
          і комерційних даних товарів.

      - id: WBS-5.5
        name: Перша синхронізація даних
        description: >
          Публікація підготовлених даних
          в e-Sklep.

      - id: WBS-5.6
        name: Перевірка результатів синхронізації
        description: >
          Перевірка коректності
          опублікованих даних.

  - id: M6
    name: Налаштування B2B та інтеграцій
    description: >
      Налаштування функцій B2B
      та інтеграцій проєкту.

    wbs:

      - id: WBS-6.1
        name: Налаштування функцій B2B
        description: >
          Налаштування функцій,
          які використовує замовник.

      - id: WBS-6.2
        name: Налаштування цін і знижок B2B
        description: >
          Налаштування індивідуальних цін,
          знижок і правил відображення цін.

      - id: WBS-6.3
        name: Налаштування умов співпраці
        description: >
          Налаштування кредитних лімітів,
          відстрочок платежів та інших умов.

      - id: WBS-6.4
        name: Налаштування інтеграцій
        description: >
          Налаштування інтеграцій,
          передбачених проєктом.

      - id: WBS-6.5
        name: Перевірка функцій B2B та інтеграцій
        description: >
          Перевірка коректності
          налаштованих функцій.

  - id: M7
    name: Презентація та приймання проєкту
    description: >
      Демонстрація впровадженого рішення замовнику,
      опрацювання його зауважень і формальне приймання проєкту.

    wbs:

      - id: WBS-7.1
        name: Підготовка до презентації проєкту
        description: >
          Підтвердження готовності системи до демонстрації
          і підготовка сценарію презентації.

      - id: WBS-7.2
        name: Презентація рішення замовнику
        description: >
          Демонстрація впровадженого рішення замовнику
          і фіксація його зауважень.

      - id: WBS-7.3
        name: Опрацювання зауважень, виявлених на презентації
        description: >
          Усунення зауважень, що стосуються специфікації,
          і узгодження долі зауважень поза її межами.

      - id: WBS-7.4
        name: Приймання проєкту
        description: >
          Підтвердження готовності
          проєкту замовником.

  - id: M8
    name: Навчання користувачів
    description: >
      Підготовка користувачів
      до роботи з системою.

    wbs:

      - id: WBS-8.1
        name: Підготовка навчання
        description: >
          Підготовка програми
          і матеріалів навчання.

      - id: WBS-8.2
        name: Проведення навчання
        description: >
          Навчання користувачів
          роботі з системою.

      - id: WBS-8.3
        name: Підтвердження готовності користувачів
        description: >
          Підтвердження готовності
          користувачів до експлуатації.

  - id: M9
    name: Запуск і гіперпідтримка
    description: >
      Введення рішення в промислову
      експлуатацію та супровід запуску.

    wbs:

      - id: WBS-9.1
        name: Підготовка до запуску
        description: >
          Виконання заходів
          перед запуском.

      - id: WBS-9.2
        name: Запуск в експлуатацію
        description: >
          Введення магазину
          в промислову експлуатацію.

      - id: WBS-9.4
        name: Завершення проєкту
        description: >
          Формальне закриття проєкту.
