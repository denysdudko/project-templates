template:
  id: e-sklep-b2b
  name: Comarch e-Sklep B2B
  version: 1.0

project:
  type: implementation

  product: Comarch e-Sklep B2B

  description: >
    Внедрение платформы Comarch e-Sklep B2B, настройка интеграции
    с Comarch ERP Optima, подготовка данных, конфигурация системы,
    тестирование, обучение пользователей и ввод в промышленную эксплуатацию.

  objective: >
    Передать заказчику полностью работоспособную систему
    Comarch e-Sklep B2B, интегрированную с Comarch ERP Optima
    и готовую к использованию в ежедневной работе.

  default_duration_weeks: 12

milestones:

  - id: M1
    name: Анализ требований
    description: >
      Определение бизнес-требований, функциональных требований,
      требований к интеграциям и данным ERP, подготовка
      и согласование спецификации проекта.

    wbs:

      - id: WBS-1.1
        name: Анализ бизнес-процессов
        description: >
          Определение бизнес-процессов заказчика,
          которые будут реализованы в e-Sklep.

      - id: WBS-1.2
        name: Анализ функциональных требований
        description: >
          Определение необходимых функций e-Sklep
          и B2B.

      - id: WBS-1.3
        name: Анализ интеграций
        description: >
          Определение необходимых интеграций
          с ERP и внешними сервисами.

      - id: WBS-1.4
        name: Анализ исходных данных
        description: >
          Оценка готовности данных ERP
          к публикации в e-Sklep.

      - id: WBS-1.5
        name: Подготовка спецификации проекта
        description: >
          Формирование и согласование
          спецификации проекта.

  - id: M2
    name: Подготовка ERP
    description: >
      Подготовка Comarch ERP Optima
      к интеграции с Comarch e-Sklep.

    wbs:

      - id: WBS-2.1
        name: Подготовка Comarch ERP Optima к интеграции
        description: >
          Проверка и настройка ERP
          для работы с e-Sklep.

      - id: WBS-2.2
        name: Настройка интеграции e-Sklep
        description: >
          Создание подключения магазина
          в Comarch ERP Optima.

      - id: WBS-2.3
        name: Настройка параметров обмена
        description: >
          Настройка параметров
          синхронизации данных.

      - id: WBS-2.4
        name: Подготовка к подключению e-Sklep
        description: >
          Проверка готовности
          к подключению магазина.

  - id: M3
    name: Подключение e-Sklep
    description: >
      Подключение Comarch e-Sklep
      к Comarch ERP Optima.

    wbs:

      - id: WBS-3.1
        name: Подключение e-Sklep к ERP
        description: >
          Создание подключения
          между ERP и e-Sklep.

      - id: WBS-3.2
        name: Настройка параметров подключения
        description: >
          Настройка параметров
          подключения магазина.

      - id: WBS-3.3
        name: Проверка подключения
        description: >
          Проверка корректности
          подключения магазина.

  - id: M4
    name: Настройка e-Sklep
    description: >
      Базовая настройка магазина
      без настройки функций B2B.

    wbs:

      - id: WBS-4.1
        name: Настройка общих параметров магазина
        description: >
          Настройка основных параметров e-Sklep.

      - id: WBS-4.2
        name: Настройка внешнего вида магазина
        description: >
          Настройка шаблона
          и оформления магазина.

      - id: WBS-4.3
        name: Настройка способов оплаты
        description: >
          Настройка способов оплаты.

      - id: WBS-4.4
        name: Настройка способов доставки
        description: >
          Настройка способов доставки.

      - id: WBS-4.5
        name: Настройка уведомлений и параметров магазина
        description: >
          Настройка уведомлений
          и общих параметров магазина.

  - id: M5
    name: Подготовка данных
    description: >
      Подготовка данных ERP
      к публикации в e-Sklep.

    wbs:

      - id: WBS-5.1
        name: Подготовка товаров
        description: >
          Подготовка карточек товаров
          к публикации.

      - id: WBS-5.2
        name: Подготовка структуры каталога
        description: >
          Подготовка категорий,
          групп и структуры каталога.

      - id: WBS-5.3
        name: Подготовка описаний и мультимедиа
        description: >
          Подготовка описаний,
          zdjęć и других материалов.

      - id: WBS-5.4
        name: Подготовка атрибутов и данных
        description: >
          Подготовка атрибутов
          и коммерческих данных товаров.

      - id: WBS-5.5
        name: Первая синхронизация данных
        description: >
          Публикация подготовленных данных
          в e-Sklep.

      - id: WBS-5.6
        name: Проверка результатов синхронизации
        description: >
          Проверка корректности
          опубликованных данных.

  - id: M6
    name: Настройка B2B и интеграций
    description: >
      Настройка функций B2B
      и интеграций проекта.

    wbs:

      - id: WBS-6.1
        name: Настройка функций B2B
        description: >
          Настройка функций,
          используемых заказчиком.

      - id: WBS-6.2
        name: Настройка цен и скидок B2B
        description: >
          Настройка индивидуальных цен,
          скидок и правил отображения цен.

      - id: WBS-6.3
        name: Настройка условий сотрудничества
        description: >
          Настройка кредитных лимитов,
          отсрочек платежей и других условий.

      - id: WBS-6.4
        name: Настройка интеграций
        description: >
          Настройка интеграций,
          предусмотренных проектом.

      - id: WBS-6.5
        name: Проверка функций B2B и интеграций
        description: >
          Проверка корректности
          настроенных функций.

  - id: M7
    name: Тестирование и приемка
    description: >
      Проверка работоспособности
      решения и приемка проекта.

    wbs:

      - id: WBS-7.1
        name: Подготовка тестирования
        description: >
          Подготовка тестовой программы.

      - id: WBS-7.2
        name: Функциональное тестирование
        description: >
          Проверка реализованных функций.

      - id: WBS-7.3
        name: Исправление выявленных замечаний
        description: >
          Устранение замечаний,
          выявленных при тестировании.

      - id: WBS-7.4
        name: Приемка проекта
        description: >
          Подтверждение готовности
          проекта заказчиком.

  - id: M8
    name: Обучение пользователей
    description: >
      Подготовка пользователей
      к работе с системой.

    wbs:

      - id: WBS-8.1
        name: Подготовка обучения
        description: >
          Подготовка программы
          и материалов обучения.

      - id: WBS-8.2
        name: Проведение обучения
        description: >
          Обучение пользователей
          работе с системой.

      - id: WBS-8.3
        name: Подтверждение готовности пользователей
        description: >
          Подтверждение готовности
          пользователей к эксплуатации.

  - id: M9
    name: Запуск и гиперподдержка
    description: >
      Ввод решения в промышленную
      эксплуатацию и сопровождение запуска.

    wbs:

      - id: WBS-9.1
        name: Подготовка к запуску
        description: >
          Выполнение мероприятий
          перед запуском.

      - id: WBS-9.2
        name: Запуск в эксплуатацию
        description: >
          Ввод магазина
          в промышленную эксплуатацию.

      - id: WBS-9.3
        name: Гиперподдержка
        description: >
          Поддержка пользователей
          после запуска.

      - id: WBS-9.4
        name: Завершение проекта
        description: >
          Формальное закрытие проекта.
