# Эталонное распределение WBS по спринтам (Этап 5 — шаблон, не алгоритм).
#
# Каждый WBS из schema/milestones_wbs.yaml (M1-M9) должен быть указан ровно
# в одном спринте — agent/assemble_plan.py (--selftest) проверяет это явно:
# не пропущен, не задублирован. Task наследует спринт своего WBS целиком —
# внутри одного WBS все Task лежат в одном и том же спринте, WBS не режется.
#
# duration_weeks — ручное решение консультанта (не производная от
# трудоёмкости): сколько календарных недель занимает этот спринт. Даты
# спринтов вычисляются agent/assemble_plan.py последовательно накопительно
# от charter.start_date — первый спринт стартует в start_date, каждый
# следующий начинается сразу после конца предыдущего.
#
# Значения ниже — отправная точка, взятая из последнего расчёта прежнего
# алгоритма упаковки на agent/examples/client-abc.input.json (см.
# CHANGELOG.md), с одним ручным изменением: WBS-9.3 (Гиперподдержка) раньше
# распределялась по отдельной Task (T-9.3.1/T-9.3.2/T-9.3.3) и могла занимать
# несколько спринтов подряд — в этом шаблоне WBS не режется, поэтому вся
# WBS-9.3 сведена в один спринт с номинальной длительностью
# sprint_duration_weeks (agent/estimation-config.yaml), не производной от
# трудозатрат: фактическая длительность гиперподдержки определяется по
# итогам T-9.3.1 (согласование с заказчиком), а не календарным расчётом.
# Откалибровать под конкретный проект (объём, состав интеграций, желаемые
# даты) — задача консультанта при генерации плана для клиента, не агента.
#
# team_capacity_per_sprint (80ч) и sprint_duration_weeks (2 нед.) из
# agent/estimation-config.yaml — по-прежнему ориентир для калибровки (не
# жёсткая граница, которую код бы проверял).

sprints:
  - number: 1
    duration_weeks: 2
    wbs:
      - WBS-1.1
      - WBS-1.2
      - WBS-1.3
      - WBS-1.4
      - WBS-1.5
      - WBS-2.1
      - WBS-2.2
      - WBS-2.3
      - WBS-2.4
      - WBS-3.1
      - WBS-3.2
      - WBS-3.3
      - WBS-4.1
      - WBS-4.2
      - WBS-4.3
      - WBS-4.4
      - WBS-4.5
      - WBS-5.1

  - number: 2
    duration_weeks: 2
    wbs:
      - WBS-5.2
      - WBS-5.3
      - WBS-5.4
      - WBS-5.5
      - WBS-5.6
      - WBS-6.1
      - WBS-6.2
      - WBS-6.3
      - WBS-6.4
      - WBS-6.5
      - WBS-7.1
      - WBS-7.2

  - number: 3
    duration_weeks: 2
    wbs:
      - WBS-7.3
      - WBS-7.4
      - WBS-8.1
      - WBS-8.2
      - WBS-8.3
      - WBS-9.1
      - WBS-9.2

  - number: 4
    duration_weeks: 2
    wbs:
      - WBS-9.3

  - number: 5
    duration_weeks: 1
    wbs:
      - WBS-9.4
