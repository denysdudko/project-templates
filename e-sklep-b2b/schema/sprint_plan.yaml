# Эталонное распределение WBS по спринтам — фиксированный шаблон (не алгоритм).
#
# Каждый WBS из schema/milestones_wbs.yaml (M1-M9) указан ровно в одном
# спринте — agent/assemble_plan.py (--selftest) проверяет это явно: не
# пропущен, не задублирован. Task наследует спринт своего WBS целиком —
# внутри одного WBS все Task лежат в одном и том же спринте, WBS не режется.
#
# duration_weeks — ручное решение консультанта (не производная от
# трудоёмкости). Даты спринтов вычисляются agent/assemble_plan.py
# последовательно накопительно от charter.start_date.
#
# Это утверждённый шаблон для всех клиентов e-sklep-b2b. Распределение
# фиксировано и не меняется без отдельного решения — алгоритм упаковки
# спринтов больше не используется. Гиперподдержка ведётся отдельным Epic
# "Поддержка" (создаётся jira_export.py всегда) и не входит в этот план.
#
# Калибровка под конкретного клиента (даты, состав интеграций) — задача
# консультанта при генерации плана для клиента, не агента.

sprints:
  - number: 1
    duration_weeks: 1
    wbs:
      - WBS-1.1
      - WBS-1.2
      - WBS-1.3
      - WBS-1.4
      - WBS-1.5

  - number: 2
    duration_weeks: 1
    wbs:
      - WBS-2.1
      - WBS-2.2
      - WBS-2.3
      - WBS-2.4
      - WBS-3.1
      - WBS-3.2
      - WBS-3.3
      - WBS-4.1
      - WBS-4.2
      - WBS-4.3
      - WBS-4.4
      - WBS-4.5

  - number: 3
    duration_weeks: 2
    wbs:
      - WBS-5.1
