milestone: M8
name: Навчання користувачів

tasks:

# ===================================================================
# WBS-8.1 Підготовка навчання
# ===================================================================

- wbs: WBS-8.1

  tasks:

    - id: T-8.1.1
      name: Визначити склад учасників і формат навчання

      description: >
        Узгодити із замовником, хто із співробітників має пройти
        навчання роботі з e-Sklep, і в якому форматі його провести
        (очно, онлайн, кількість сесій).

      performer: Консультант

      source:
        type: Internal Project Methodology

      result:
        - Узгоджений склад учасників і формат навчання

      used_by:
        - T-8.1.2

      interview_checklist:
        - Хто із співробітників замовника має пройти навчання роботі з e-Sklep?
        - "У якому форматі зручно провести навчання: очно, онлайн, у декілька сесій?"

      verification_checklist:
        - Перевірити, що склад учасників і формат навчання узгоджено із замовником.

    - id: T-8.1.2
      name: Підготувати матеріали та сценарій навчання

      description: >
        Підготувати матеріали для навчання на основі підсумкової
        конфігурації системи, налаштованої в M2–M6, і офіційних
        навчальних матеріалів Comarch, включно зі сценарієм з трьох
        частин: презентація можливостей, розбір робочих сценаріїв,
        запитання та відповіді.

      performer: Консультант

      depends_on:
        - T-8.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/kategoria/jak-zaczac/

      result:
        - Підготовлені матеріали та сценарій навчання

      used_by:
        - WBS-8.2

      interview_checklist: []

      verification_checklist:
        - Перевірити, що матеріали відображають саме налаштовану для замовника конфігурацію, а не типову демо-версію.
        - "Перевірити, що сценарій включає всі три частини: презентацію можливостей, розбір сценаріїв, запитання та відповіді."

# ===================================================================
# WBS-8.2 Проведення навчання
# ===================================================================

- wbs: WBS-8.2

  tasks:

    - id: T-8.2.1
      name: Провести презентацію можливостей системи

      description: >
        Провести для учасників навчання презентацію основних
        можливостей налаштованого e-Sklep (каталог, оформлення
        замовлення, оплата, доставка, особистий кабінет B2B) за
        підготовленим сценарієм.

      performer: Консультант

      depends_on:
        - T-8.1.2

      source:
        type: Internal Project Methodology

      result:
        - Проведена презентація можливостей системи

      used_by:
        - T-8.2.2

      interview_checklist: []

      verification_checklist:
        - Перевірити, що презентація охоплює всі розділи, узгоджені в T-8.1.2.
        - Перевірити, що всі учасники, визначені в T-8.1.1, були присутні на презентації.

    - id: T-8.2.2
      name: Розібрати з користувачами типові робочі сценарії

      description: >
        Розібрати з учасниками навчання типові сценарії їхньої
        повсякденної роботи в системі (обробка замовлення, робота
        з цінами та лімітами B2B, робота зі сповіщеннями),
        використовуючи реальні дані налаштованого магазину.

      performer: Консультант

      depends_on:
        - T-8.2.1

      source:
        type: Internal Project Methodology

      result:
        - Розібрані з користувачами робочі сценарії

      used_by:
        - T-8.2.3

      interview_checklist: []

      verification_checklist:
        - Перевірити, що розібрані сценарії відповідають функціям, які користувачі будуть використовувати в повсякденній роботі.

    - id: T-8.2.3
      name: Відповісти на запитання учасників навчання

      description: >
        Провести сесію запитань і відповідей за підсумками навчання,
        зафіксувати запитання, на які не вдалося відповісти
        одразу, для подальшого опрацювання.

      performer: Консультант

      depends_on:
        - T-8.2.2

      source:
        type: Internal Project Methodology

      result:
        - Зафіксовані відповіді та відкриті запитання учасників

      used_by:
        - WBS-8.3

      interview_checklist: []

      verification_checklist:
        - Перевірити, що всі поставлені запитання зафіксовано.
        - Перевірити, що на кожне запитання надано відповідь або призначено відповідального і термін для подальшого опрацювання.

# ===================================================================
# WBS-8.3 Підтвердження готовності користувачів
# ===================================================================

- wbs: WBS-8.3

  tasks:

    - id: T-8.3.1
      name: Зібрати підтвердження готовності від учасників навчання

      description: >
        Зібрати від учасників навчання підтвердження того, що вони
        розуміють порядок роботи з системою і готові розпочати
        експлуатацію, а також закрити відкриті запитання,
        зафіксовані в T-8.2.3.

      performer: Консультант

      depends_on:
        - T-8.2.3

      source:
        type: Internal Project Methodology

      result:
        - Підтверджена готовність користувачів до експлуатації

      used_by:
        - T-9.1.1

      interview_checklist:
        - Чи залишилися в учасників навчання відкриті запитання, що потребують опрацювання перед запуском?

      verification_checklist:
        - Перевірити, що відкриті запитання з T-8.2.3 закрито.
        - Перевірити, що учасники підтвердили готовність до самостійної роботи з системою.
