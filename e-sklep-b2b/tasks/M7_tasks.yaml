milestone: M7
name: Презентация и приёмка проекта

tasks:

# ===================================================================
# WBS-7.1 Подготовка к презентации проекта
# ===================================================================

- wbs: WBS-7.1

  tasks:

    - id: T-7.1.1
      name: Свести результаты выполнения M2–M6 для демонстрации

      description: >
        Собрать подтвержденные результаты (verification_checklist)
        задач milestones M2–M6, чтобы убедиться, что ключевые
        функции системы (интеграция с ERP, магазин, данные, B2B,
        интеграции) готовы к демонстрации заказчику.

      performer: Консультант

      source:
        type: Internal Project Methodology

      result:
        - Сводный отчет о готовности системы к демонстрации

      used_by:
        - T-7.1.2

      interview_checklist: []

      verification_checklist:
        - Проверить, что все задачи M2–M6 закрыты, а их verification_checklist пройден.
        - Проверить, что отсутствуют незакрытые критичные замечания по предыдущим этапам.

    - id: T-7.1.2
      name: Подготовить сценарий тестового заказа для демонстрации

      description: >
        Подготовить сценарий тестового заказа, повторяющий реальный
        процесс покупки в e-Sklep (выбор товара, оформление заказа,
        подтверждение, синхронизация с ERP), согласно документированному
        процессу оформления заказа.

      performer: Консультант

      depends_on:
        - T-7.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/jak-przebiega-proces-zamowienia/

      result:
        - Согласованный сценарий тестового заказа для демонстрации

      used_by:
        - WBS-7.2

      interview_checklist:
        - Какие товары, способы оплаты и доставки должны быть использованы в демонстрационном заказе?
        - Кто со стороны заказчика будет присутствовать на демонстрации?

      verification_checklist:
        - Проверить, что сценарий охватывает оформление заказа, оплату и получение уведомлений.
        - Проверить, что сценарий согласован с заказчиком.

# ===================================================================
# WBS-7.2 Презентация решения заказчику
# ===================================================================

- wbs: WBS-7.2

  tasks:

    - id: T-7.2.1
      name: Провести демонстрацию полного цикла заказа заказчику

      description: >
        Провести для заказчика демонстрацию e-Sklep по
        подготовленному сценарию (T-7.1.2): оформление тестового
        заказа покупателем, подтверждение заказа в панели
        администратора, синхронизация заказа с ERP Optima —
        согласно документированному процессу оформления заказа.

      performer: Консультант

      depends_on:
        - T-7.1.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/jak-przebiega-proces-zamowienia/

      result:
        - Проведенная демонстрация с участием заказчика

      used_by:
        - T-7.2.2

      interview_checklist: []

      verification_checklist:
        - Проверить, что тестовый заказ прошёл полный цикл: оформление → подтверждение → синхронизация с ERP.
        - Проверить, что заказчик подтвердил соответствие продемонстрированного функционала согласованным требованиям (T-1.2.2).

    - id: T-7.2.2
      name: Зафиксировать замечания и вопросы заказчика по итогам демонстрации

      description: >
        Зафиксировать все замечания, вопросы и пожелания,
        высказанные заказчиком в ходе демонстрации, для
        дальнейшей обработки.

      performer: Консультант

      depends_on:
        - T-7.2.1

      source:
        type: Internal Project Methodology

      result:
        - Протокол замечаний по итогам демонстрации

      used_by:
        - WBS-7.3

      interview_checklist:
        - Есть ли у заказчика замечания к продемонстрированному функционалу?
        - Есть ли у заказчика дополнительные пожелания, не входящие в согласованную спецификацию (T-1.5.2)?

      verification_checklist:
        - Проверить, что все замечания заказчика зафиксированы в протоколе.

# ===================================================================
# WBS-7.3 Обработка замечаний, выявленных на презентации
# ===================================================================

- wbs: WBS-7.3

  tasks:

    - id: T-7.3.1
      name: Устранить замечания, относящиеся к согласованной спецификации проекта

      description: >
        Устранить замечания заказчика (T-7.2.2), которые относятся
        к работам, согласованным в спецификации проекта (T-1.5.2),
        внеся необходимые изменения в соответствующих задачах
        M2–M6.

      performer: Консультант

      depends_on:
        - T-7.2.2

      source:
        type: Internal Project Methodology

      result:
        - Устраненные замечания, относящиеся к согласованной спецификации

      used_by:
        - T-7.4.1

      interview_checklist: []

      verification_checklist:
        - Проверить, что каждое замечание из протокола (T-7.2.2), относящееся к спецификации, устранено.
        - Проверить, что исправления не нарушили ранее пройденные verification_checklist соответствующих задач.

    - id: T-7.3.2
      name: Согласовать с заказчиком замечания, выходящие за рамки спецификации

      description: >
        Для замечаний и пожеланий заказчика, выходящих за рамки
        согласованной спецификации проекта (T-1.5.2), согласовать
        их дальнейшую судьбу: отдельный запрос на изменение,
        следующий этап проекта, или отклонение с обоснованием.

      performer: Консультант

      depends_on:
        - T-7.2.2

      source:
        type: Internal Project Methodology

      result:
        - Согласованное решение по замечаниям вне рамок спецификации

      used_by:
        - T-7.4.1

      interview_checklist:
        - Согласен ли заказчик, что данное замечание выходит за рамки утвержденной спецификации?
        - Как заказчик хочет поступить с этим замечанием: отдельный запрос на изменение, следующий этап, или отказ?

      verification_checklist:
        - Проверить, что по каждому замечанию вне рамок спецификации зафиксировано согласованное решение.

# ===================================================================
# WBS-7.4 Приемка проекта
# ===================================================================

- wbs: WBS-7.4

  tasks:

    - id: T-7.4.1
      name: Подготовить акт приемки проекта

      description: >
        Подготовить акт приемки, отражающий выполненные работы по
        milestones M1–M6, устраненные замечания (T-7.3.1) и
        согласованные решения по замечаниям вне спецификации
        (T-7.3.2).

      performer: Консультант

      depends_on:
        - T-7.3.1
        - T-7.3.2

      source:
        type: Internal Project Methodology

      result:
        - Проект акта приемки

      used_by:
        - T-7.4.2

      interview_checklist: []

      verification_checklist:
        - Проверить, что акт приемки отражает все выполненные milestones.
        - Проверить, что в акте учтены решения по всем замечаниям заказчика.

    - id: T-7.4.2
      name: Подписать акт приемки проекта заказчиком

      description: >
        Получить подписанный заказчиком акт приемки проекта,
        подтверждающий формальное завершение этапа внедрения.

      performer: Консультант

      depends_on:
        - T-7.4.1

      source:
        type: Internal Project Methodology

      result:
        - Подписанный акт приемки проекта

      used_by:
        - M8

      interview_checklist: []

      verification_checklist:
        - Проверить, что акт приемки подписан уполномоченным представителем заказчика.
