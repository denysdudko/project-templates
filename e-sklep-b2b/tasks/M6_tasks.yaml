milestone: M6
name: Настройка B2B и интеграций

tasks:

# ===================================================================
# WBS-6.1 Настройка функций B2B
# ===================================================================

- wbs: WBS-6.1

  tasks:

    - id: T-6.1.1
      name: Согласовать параметры регистрации покупателей для B2B

      description: >
        Согласовать с заказчиком настройки регистрации в разделе
        Ustawienia → Klienci → Ustawienia rejestracji: требуется
        ли модерация регистрации администратором ("Administrator
        musi zaakceptować konto"), нужен ли механизм массового
        создания учетных записей для контрагентов, уже
        существующих в ERP Optima.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/jak-skonfigurowac-sklep-pod-obsluge-b2b/

      result:
        - Согласованные параметры регистрации покупателей

      used_by:
        - T-6.1.4

      interview_checklist:
        - Должен ли администратор подтверждать каждую регистрацию нового покупателя вручную?
        - Нужно ли массово создать учетные записи для контрагентов, уже существующих в ERP Optima (по данным из ERP или файла Excel)?
        - Должна ли регистрация быть открыта для всех, или доступ предоставляется только выбранным партнерам?

      verification_checklist:
        - Проверить, что параметры регистрации согласованы с заказчиком.

    - id: T-6.1.2
      name: Согласовать ограничения на оформление заказов для B2B

      description: >
        Согласовать с заказчиком, должна ли покупка быть доступна
        только зарегистрированным компаниям (без гостевых заказов),
        а также требуется ли минимальная сумма заказа, от которой
        принимаются заказы.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/jak-skonfigurowac-sklep-pod-obsluge-b2b/

      result:
        - Согласованные ограничения на оформление заказов

      used_by:
        - T-6.1.4

      interview_checklist:
        - Должна ли покупка быть доступна только зарегистрированным компаниям, без возможности гостевого оформления заказа?
        - Требуется ли минимальная сумма заказа, при которой заказ принимается к исполнению?

      verification_checklist:
        - Проверить, что ограничения на оформление заказов согласованы с заказчиком.

    - id: T-6.1.3
      name: Согласовать видимость цен для незарегистрированных пользователей

      description: >
        Согласовать с заказчиком, должны ли цены товаров быть
        скрыты от пользователей, не вошедших в личный кабинет
        (типичное для B2B поведение, в отличие от розничной
        модели, где цена общедоступна).

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/jak-skonfigurowac-sklep-pod-obsluge-b2b/

      result:
        - Согласованное решение по видимости цен для незарегистрированных пользователей

      used_by:
        - T-6.1.4

      interview_checklist:
        - Должны ли цены товаров быть скрыты для пользователей, которые не вошли в личный кабинет?

      verification_checklist:
        - Проверить, что решение о видимости цен согласовано с заказчиком.

    - id: T-6.1.4
      name: Настроить параметры регистрации, заказов и видимости цен в панели администратора

      description: >
        В панели администратора e-Sklep внести согласованные
        настройки регистрации (Ustawienia → Klienci → Ustawienia
        rejestracji), ограничения на оформление заказов и
        видимость цен для незарегистрированных пользователей,
        согласно решениям T-6.1.1 – T-6.1.3.

      performer: Консультант

      depends_on:
        - T-6.1.1
        - T-6.1.2
        - T-6.1.3

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/jak-skonfigurowac-sklep-pod-obsluge-b2b/

      result:
        - Настроенные параметры регистрации, заказов и видимости цен

      used_by:
        - WBS-6.5

      interview_checklist: []

      verification_checklist:
        - Проверить, что настройки регистрации соответствуют согласованным в T-6.1.1.
        - Проверить, что ограничения на заказы соответствуют согласованным в T-6.1.2.
        - Проверить, что видимость цен для незарегистрированных пользователей соответствует согласованному в T-6.1.3.

# ===================================================================
# WBS-6.2 Настройка цен и скидок B2B
# ===================================================================

- wbs: WBS-6.2

  tasks:

    - id: T-6.2.1
      name: Согласовать модель индивидуальных цен и скидок для контрагентов

      description: >
        Согласовать с заказчиком, каким контрагентам или группам
        контрагентов должны назначаться индивидуальные цены (типа
        "stała cena") или процентные скидки, а также нужны ли
        срочные (временные) скидки с датами начала/окончания.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/rabaty-z-comarch-erp-optima/

      result:
        - Согласованная модель индивидуальных цен и скидок

      used_by:
        - T-6.2.2

      interview_checklist:
        - Каким контрагентам или группам контрагентов должны быть назначены индивидуальные цены или скидки?
        - Нужны ли скидки типа "фиксированная цена" (stała cena), или достаточно процентных скидок?
        - Нужны ли срочные скидки с датой начала и/или окончания действия?

      verification_checklist:
        - Проверить, что модель индивидуальных цен и скидок согласована с заказчиком.

    - id: T-6.2.2
      name: Настроить индивидуальные цены и скидки в ERP Optima

      description: >
        В разделе Ogólne/Rabaty (или Ogólne/Cennik для конкретных
        товаров) создать согласованные скидки и/или фиксированные
        цены для соответствующих контрагентов или групп
        контрагентов, включая даты начала/окончания для срочных
        скидок.

      performer: Консультант

      depends_on:
        - T-6.2.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026_5/dokumentacja/jak-ustawic-indywidualne-ceny-dla-kontrahentow/

      result:
        - Созданные в ERP Optima индивидуальные цены и скидки

      used_by:
        - T-6.2.3

      interview_checklist: []

      verification_checklist:
        - Проверить, что созданные скидки/цены соответствуют согласованной модели (T-6.2.1).
        - Проверить, что даты начала/окончания скидок заданы корректно там, где это требуется.

    - id: T-6.2.3
      name: Привязать индивидуальный ценник к карточке контрагента

      description: >
        На карточке контрагента в ERP Optima (вкладка e-Sklep)
        указать тип отображаемой цены (индивидуальный ценник),
        чтобы соответствующий контрагент видел свои цены после
        входа в личный кабинет e-Sklep.

      performer: Консультант

      depends_on:
        - T-6.2.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/indywidualne-cenniki-dla-kontrahentow/

      result:
        - Привязанный к контрагентам индивидуальный ценник

      used_by:
        - T-6.2.5

      interview_checklist: []

      verification_checklist:
        - Проверить, что на карточках согласованных контрагентов указан корректный ценник на вкладке e-Sklep.

    - id: T-6.2.4
      name: Включить расчёт скидок из ERP в панели администратора e-Sklep

      description: >
        В панели администратора e-Sklep в разделе Ustawienia →
        Ustawienia sklepu → Ceny i rabaty включить параметр
        "Sposób liczenia rabatów w koszyku", чтобы скидки,
        переданные из ERP Optima, применялись в корзине покупателя.

      performer: Консультант

      depends_on:
        - T-6.2.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/rabaty-z-comarch-erp-optima/

      result:
        - Включенный расчёт скидок из ERP в корзине e-Sklep

      used_by:
        - T-6.2.5

      interview_checklist: []

      verification_checklist:
        - Проверить, что параметр расчёта скидок в корзине включен.

    - id: T-6.2.5
      name: Выполнить синхронизацию и проверить отображение цен и скидок

      description: >
        Выполнить синхронизацию (ручную или разностную) для
        передачи цен, скидок и данных контрагентов в e-Sklep, и
        проверить, что настроенные цены и скидки корректно
        отображаются в панели администратора (Marketing → Rabaty)
        и у контрагента после входа в личный кабинет.

      performer: Консультант

      depends_on:
        - T-6.2.3
        - T-6.2.4

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/rabaty-z-comarch-erp-optima/

      result:
        - Подтвержденное корректное отображение цен и скидок

      used_by:
        - WBS-6.5

      interview_checklist: []

      verification_checklist:
        - Проверить, что скидки видны в панели администратора в разделе Marketing → Rabaty (вкладки "Rabat z Comarch ERP Optima" и "Stała cena z Comarch ERP Optima").
        - Проверить, что контрагент после входа видит цены и скидки согласно назначенному ценнику.

# ===================================================================
# WBS-6.3 Настройка условий сотрудничества
# ===================================================================

- wbs: WBS-6.3

  tasks:

    - id: T-6.3.1
      name: Согласовать условия сотрудничества (кредитный лимит и лимит просроченных платежей)

      description: >
        Согласовать с заказчиком, каким контрагентам должен быть
        присвоен кредитный лимит и/или лимит просроченных платежей,
        а также какой режим контроля лимита должен применяться при
        оформлении заказа (без действия, предупреждение, блокировка).

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/limit-kredytu-i-limit-przeterminowanych-platnosci/

      result:
        - Согласованные условия сотрудничества (лимиты и режим контроля)

      used_by:
        - T-6.3.2

      interview_checklist:
        - Каким контрагентам должен быть присвоен кредитный лимит?
        - Каким контрагентам должен быть присвоен лимит просроченных платежей?
        - "Какой режим контроля лимита платежей должен применяться при оформлении заказа: без действия, предупреждение или блокировка?"

      verification_checklist:
        - Проверить, что условия сотрудничества согласованы с заказчиком.

    - id: T-6.3.2
      name: Установить лимиты на карточках контрагентов в ERP Optima

      description: >
        На карточке контрагента со статусом "podmiot gospodarczy"
        в ERP Optima установить согласованные значения "Limit
        kredytu" и/или "Limit przeterminowanych płatności".

      performer: Консультант

      depends_on:
        - T-6.3.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/limit-kredytu-i-limit-przeterminowanych-platnosci/

      result:
        - Установленные лимиты на карточках контрагентов

      used_by:
        - T-6.3.3

      interview_checklist: []

      verification_checklist:
        - Проверить, что лимиты установлены на карточках согласованных контрагентов.

    - id: T-6.3.3
      name: Включить отображение лимитов в личном кабинете e-Sklep

      description: >
        В панели администратора e-Sklep в разделе Ustawienia →
        Ustawienia sklepu → Klienci включить параметр "Limity
        kredytu i płatności", чтобы контрагенты видели свой
        доступный лимит и сумму просроченных платежей в личном
        кабинете (Strefa klienta).

      performer: Консультант

      depends_on:
        - T-6.3.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/limit-kredytu-i-limit-przeterminowanych-platnosci/

      result:
        - Включенное отображение лимитов в личном кабинете

      used_by:
        - T-6.3.4

      interview_checklist: []

      verification_checklist:
        - Проверить, что параметр "Limity kredytu i płatności" включен.
        - Проверить, что режим контроля лимита платежей, настроенный в T-2.4.2, соответствует согласованному в T-6.3.1.

    - id: T-6.3.4
      name: Проверить отображение и контроль лимитов после синхронизации

      description: >
        Выполнить синхронизацию контрагентов и проверить, что
        лимит кредита и лимит просроченных платежей отображаются
        в личном кабинете e-Sklep для контрагента, а также что при
        превышении лимита применяется согласованный режим контроля
        при оформлении заказа с отложенной формой оплаты.

      performer: Консультант

      depends_on:
        - T-6.3.3

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/limit-kredytu-i-limit-przeterminowanych-platnosci/

      result:
        - Подтвержденная работа отображения и контроля лимитов

      used_by:
        - WBS-6.5

      interview_checklist: []

      verification_checklist:
        - Проверить, что лимиты отображаются в личном кабинете контрагента (Strefa klienta).
        - Проверить, что при превышении лимита система реагирует согласно согласованному режиму контроля (T-6.3.1).

# ===================================================================
# WBS-6.4 Настройка интеграций
# ===================================================================

- wbs: WBS-6.4

  tasks:

    - id: T-6.4.1
      name: Уточнить перечень интеграций, подлежащих настройке на этом этапе

      description: >
        Свести перечень интеграций, согласованный в задаче T-1.3.2
        (M1), с фактически доступными для e-Sklep B2B интеграциями
        (раздел Integracje в панели администратора и
        соответствующая категория официальной документации), и
        подтвердить, какие из них будут настроены в рамках проекта.

      performer: Консультант

      depends_on:
        - T-1.3.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/kategoria/integracje/

      result:
        - Подтвержденный перечень интеграций для настройки

      used_by:
        - T-6.4.2

      interview_checklist: []

      verification_checklist:
        - Проверить, что перечень интеграций для настройки соответствует согласованному в T-1.3.2.
        - Проверить, что для каждой интеграции определена официальная статья документации Comarch, описывающая её настройку.

    - id: T-6.4.2
      name: Настроить согласованные интеграции согласно их официальной документации

      description: >
        Для каждой интеграции из перечня, подтвержденного в
        T-6.4.1, выполнить настройку в панели администратора
        e-Sklep (раздел Integracje) строго по соответствующей
        официальной статье документации Comarch для этой
        интеграции.

      performer: Консультант

      depends_on:
        - T-6.4.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/kategoria/integracje/

      result:
        - Настроенные и активные интеграции

      used_by:
        - WBS-6.5

      interview_checklist: []

      verification_checklist:
        - Проверить, что каждая согласованная интеграция настроена и активна в разделе Integracje.
        - Проверить, что настройка каждой интеграции выполнена в соответствии с её официальной документацией Comarch.

# ===================================================================
# WBS-6.5 Проверка функций B2B и интеграций
# ===================================================================

- wbs: WBS-6.5

  tasks:

    - id: T-6.5.1
      name: Проверить корректность работы функций B2B и интеграций

      description: >
        Свести результаты настройки функций B2B (WBS-6.1), цен и
        скидок (WBS-6.2), условий сотрудничества (WBS-6.3) и
        интеграций (WBS-6.4), и подтвердить их совместную
        корректную работу перед этапом тестирования и приемки.

      performer: Консультант

      depends_on:
        - T-6.1.4
        - T-6.2.5
        - T-6.3.4
        - T-6.4.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/kategoria/b2b/

      result:
        - Подтвержденная готовность функций B2B и интеграций

      used_by:
        - M7

      interview_checklist: []

      verification_checklist:
        - Проверить, что функции регистрации, заказов и видимости цен работают согласно T-6.1.4.
        - Проверить, что индивидуальные цены и скидки отображаются согласно T-6.2.5.
        - Проверить, что условия сотрудничества (лимиты) работают согласно T-6.3.4.
        - Проверить, что все согласованные интеграции активны и работают согласно T-6.4.2.
