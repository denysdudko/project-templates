milestone: M4
name: Налаштування e-Sklep

tasks:

# ===================================================================
# WBS-4.1 Налаштування загальних параметрів магазину
# ===================================================================

- wbs: WBS-4.1

  tasks:

    - id: T-4.1.1
      name: Заповнити контактні дані та реквізити магазину

      description: >
        У розділі Ustawienia → Ustawienia sklepu → Dane sklepu →
        Dane kontaktowe заповнити основні реквізити продавця
        (назву, скорочену назву, NIP, REGON, KRS/CEIDG,
        провідну галузь, поштову адресу), контактні дані
        (телефони, месенджери) і завантажити логотип магазину.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dane-sklepu/

      result:
        - Заповнені реквізити, контактні дані та логотип магазину

      used_by:
        - T-4.1.2

      interview_checklist:
        - Які реквізити компанії (назва, NIP, REGON, KRS/CEIDG) мають бути зазначені в магазині?
        - Які контактні телефони та месенджери мають відображатися для покупців?
        - Чи є готовий логотип магазину у форматі PNG розміром до 30 КБ і роздільною здатністю 200x200 px?

      verification_checklist:
        - Перевірити, що реквізити компанії заповнені та збережені без помилок.
        - Перевірити, що контактні дані відображаються коректно.
        - Перевірити, що логотип завантажено і він відображається в панелі адміністратора.

    - id: T-4.1.2
      name: Налаштувати мовні версії та валюти магазину

      description: >
        У розділі Dane sklepu → Języki обрати мовні версії,
        доступні покупцям, і порядок їх відображення; у розділі
        Dane sklepu → Waluty налаштувати відображення інформації про
        валюти й курси, що надходять з ERP.

      performer: Консультант

      depends_on:
        - T-4.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dane-sklepu/

      result:
        - Налаштовані мовні версії та відображення валют магазину

      used_by:
        - T-4.1.3

      interview_checklist:
        - Які мовні версії магазину мають бути доступні покупцям?
        - У якому порядку мають відображатися мови в інтерфейсі?

      verification_checklist:
        - Перевірити, що увімкнені мовні версії відповідають узгодженим.
        - Перевірити, що налаштування валют відповідають рішенню, прийнятому в завданні T-2.2.1 (M2).

    - id: T-4.1.3
      name: Налаштувати домен магазину

      description: >
        Спрямувати основний домен магазину (або використати
        безкоштовний піддомен comarch-esklep.pl) на IP-адресу,
        зазначену в панелі адміністратора (Moje konto → Sklepy →
        Moje sklepy → Domeny), виконавши відповідний A-запис
        у провайдера домену.

      performer: Консультант

      depends_on:
        - T-4.1.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/konfiguracja-domeny/

      result:
        - Налаштований і працюючий домен магазину

      used_by:
        - T-9.1.1

      interview_checklist:
        - Чи використовує замовник власний домен, чи безкоштовний піддомен comarch-esklep.pl?
        - Хто на стороні замовника відповідає за налаштування DNS-записів у провайдера домену?

      verification_checklist:
        - Перевірити, що домен спрямовано (A-запис) на IP-адресу, зазначену в панелі e-Sklep.
        - Перевірити, що магазин відкривається як за адресою з "www.", так і без нього, якщо використовуються обидва варіанти.

# ===================================================================
# WBS-4.2 Налаштування зовнішнього вигляду магазину
# ===================================================================

- wbs: WBS-4.2

  tasks:

    - id: T-4.2.1
      name: Узгодити графічний шаблон магазину

      description: >
        Узгодити із замовником вибір графічного шаблону:
        готовий шаблон Comarch (для B2B — Szafir або Rubin) або
        створення індивідуального шаблону в Kreatorze wyglądu.

      performer: Консультант

      depends_on:
        - T-4.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/wybor-szablonu-startowego/

      result:
        - Узгоджений графічний шаблон магазину

      used_by:
        - T-4.2.2

      interview_checklist:
        - Чи хоче замовник використати готовий шаблон Comarch (Szafir/Rubin), чи створити індивідуальний шаблон в Kreatorze wyglądu?
        - Якщо обирається готовий шаблон — яка колірна версія бажана?

      verification_checklist:
        - Перевірити, що вибір шаблону узгоджено і зафіксовано замовником.

    - id: T-4.2.2
      name: Встановити або імпортувати обраний шаблон

      description: >
        Встановити готовий шаблон Comarch через розділ Wygląd
        sklepu → Gotowe szablony Comarch, або імпортувати
        шаблон, підготовлений у Kreatorze wyglądu, через розділ
        Wygląd sklepu → Zaimportuj szablon z Kreatora wyglądu.

      performer: Консультант

      depends_on:
        - T-4.2.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/wybor-szablonu-startowego/

      result:
        - Встановлений графічний шаблон магазину

      used_by:
        - T-7.1.1

      interview_checklist: []

      verification_checklist:
        - Перевірити, що шаблон встановлено і він відображається на вітрині магазину без помилок.
        - Перевірити, що встановлений шаблон відповідає узгодженому в T-4.2.1, включно з колірною версією для готових шаблонів.

# ===================================================================
# WBS-4.3 Налаштування способів оплати
# ===================================================================

- wbs: WBS-4.3

  tasks:

    - id: T-4.3.1
      name: Узгодити перелік способів оплати та їх реквізити

      description: >
        Узгодити із замовником перелік способів оплати, що активуються
        на вкладці Ustawienia → Płatności i dostawy →
        Płatności: стандартні (Gotówka, Przelew (Przedpłata),
        On-line, Raty) і, за потреби, додаткові
        (Dodatkowa 1, Dodatkowa 2), включно з реквізитами для оплати
        "Przelew (Przedpłata)" (номер рахунку, дані банку, код
        SWIFT).

      performer: Консультант

      depends_on:
        - T-2.4.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/macierz-dostaw/

      result:
        - Узгоджений перелік способів оплати та їх реквізити

      used_by:
        - T-4.3.2

      interview_checklist:
        - Які стандартні способи оплати мають бути активні в магазині (Gotówka, Przelew, On-line, Raty)?
        - Чи потрібні додаткові способи оплати (Dodatkowa 1, Dodatkowa 2), і що вони собою являють?
        - Якщо використовується оплата "Przelew (Przedpłata)" — які номер рахунку, дані банку та код SWIFT для відображення покупцю?

      verification_checklist:
        - Перевірити, що перелік способів оплати узгоджено із замовником.
        - Перевірити, що реквізити для "Przelew (Przedpłata)" отримано, якщо цей спосіб оплати використовується.

    - id: T-4.3.2
      name: Активувати способи оплати в панелі адміністратора

      description: >
        На вкладці Ustawienia → Płatności i dostawy → Płatności
        активувати узгоджені способи оплати і внести їхні
        реквізити, включно з даними для "Przelew (Przedpłata)".

      performer: Консультант

      depends_on:
        - T-4.3.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/macierz-dostaw/

      result:
        - Активовані та налаштовані способи оплати

      used_by:
        - T-4.4.2

      interview_checklist: []

      verification_checklist:
        - Перевірити, що всі узгоджені способи оплати активні в панелі адміністратора.
        - Перевірити, що реквізити оплати "Przelew (Przedpłata)" відображаються коректно.

# ===================================================================
# WBS-4.4 Налаштування способів доставки
# ===================================================================

- wbs: WBS-4.4

  tasks:

    - id: T-4.4.1
      name: Узгодити країни/зони доставки та способи доставки

      description: >
        Узгодити із замовником країни або зони, до яких
        здійснюється доставка, а також перелік способів
        доставки для кожної країни/зони, включно з пунктами
        самовивозу, якщо вони використовуються.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/macierz-dostaw/

      result:
        - Узгоджений перелік країн/зон і способів доставки

      used_by:
        - T-4.4.2

      interview_checklist:
        - До яких країн/зон має здійснюватися доставка товарів?
        - Які способи доставки мають бути доступні для кожної країни/зони (кур'єр, пошта, точки самовивозу, Paczkomaty InPost тощо)?
        - Чи використовуються пункти самовивозу, і якщо так — які їхні адреси?

      verification_checklist:
        - Перевірити, що список країн/зон узгоджено із замовником.
        - Перевірити, що для кожної країни/зони визначено принаймні один спосіб доставки (обов'язкова вимога системи).

    - id: T-4.4.2
      name: Налаштувати країни, способи доставки та вартість доставки/оплати

      description: >
        У розділі Ustawienia → Płatności i dostawy додати й
        активувати узгоджені країни/зони (Dostępne kraje i
        strefy), створити для них цінник доставки (Cenniki dostaw),
        додати способи доставки із зазначенням вартості, терміну
        доставки й умов безкоштовної доставки, а також прив'язати
        до кожного способу доставки налаштовані в T-4.3.2 способи
        оплати з їх вартістю і терміном оплати.

      performer: Консультант

      depends_on:
        - T-4.4.1
        - T-4.3.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/macierz-dostaw/

      result:
        - Налаштовані країни, способи доставки, вартість доставки та прив'язані способи оплати

      used_by:
        - T-7.1.1

      interview_checklist: []

      verification_checklist:
        - Перевірити, що всі узгоджені країни/зони активні та додані до цінника доставки.
        - Перевірити, що для кожної країни/зони налаштовано принаймні один спосіб доставки з вартістю та терміном доставки.
        - Перевірити, що для кожного способу доставки прив'язано принаймні один спосіб оплати (обов'язкова вимога системи).
        - Перевірити умови безкоштовної доставки/оплати, якщо вони були узгоджені.

# ===================================================================
# WBS-4.5 Налаштування сповіщень і параметрів магазину
# ===================================================================

- wbs: WBS-4.5

  tasks:

    - id: T-4.5.1
      name: Налаштувати поштовий акаунт для надсилання листів з магазину

      description: >
        У розділі Ustawienia → Ustawienia sklepu → Dane sklepu →
        Ustawienia poczty налаштувати основний поштовий акаунт для
        автоматичної розсилки листів (SMTP-сервер, порт, логін,
        пароль), що використовується для листів про замовлення, реєстрацію і
        підписку на розсилку, і надіслати тестовий лист для
        перевірки.

      performer: Консультант

      depends_on:
        - T-4.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/konfiguracja-konta-e-mail/

      result:
        - Налаштований і перевірений поштовий акаунт для автоматичних листів

      used_by:
        - T-4.5.2

      interview_checklist:
        - Яка поштова скринька (адреса, SMTP-сервер, порт, логін, пароль) має використовуватися для автоматичних листів з e-Sklep?
        - Чи використовується шифрування SSL під час підключення до SMTP-сервера?

      verification_checklist:
        - Перевірити, що дані SMTP збережено без помилок.
        - Перевірити, що тестовий лист ("Wyślij wiadomość testową") успішно доставлено на адресу в іншому домені.

    - id: T-4.5.2
      name: Налаштувати e-mail-сповіщення для адміністраторів

      description: >
        У розділі Mój profil → Sklepy → Szczegóły wybranego
        e-Sklepu → Powiadomienia e-mail налаштувати, які події
        (помилка синхронізації з ERP, помилка Comarch e-Sklep Sync,
        помилка синхронізації замовлень, закінчення токена Allegro,
        відсутність товару, новий клієнт) мають генерувати
        сповіщення, на які адреси і з якою періодичністю.

      performer: Консультант

      depends_on:
        - T-4.5.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/powiadomienia-e-mail-dla-administratorow/

      result:
        - Налаштовані e-mail-сповіщення для адміністраторів

      used_by:
        - T-4.5.3

      interview_checklist:
        - Хто із співробітників замовника має отримувати сповіщення про помилки синхронізації з ERP?
        - Чи потрібне сповіщення про нового клієнта, і чи увімкнена ручна модерація реєстрації ("Administrator musi zaakceptować konto")?
        - Чи потрібне сповіщення про відсутність товару, і чи увімкнено в магазині контроль залишків?
        - З якою періодичністю мають надходити сповіщення за кожним типом подій?

      verification_checklist:
        - Перевірити, що налаштовані сповіщення відповідають узгодженому переліку подій та адресатів.
        - Перевірити, що періодичність сповіщень задано для кожного активного сповіщення.
        - Перевірити, що сповіщення "Новий клієнт" працює лише за увімкненої ручної модерації реєстрації, якщо це узгоджено.

    - id: T-4.5.3
      name: Підготувати та опублікувати регламент (Regulamin) магазину

      description: >
        Підготувати текст регламенту магазину з урахуванням обов'язкових
        інформаційних вимог і відсутності неприпустимих
        застережень (klauzule niedozwolone), і опублікувати його в
        розділі Ustawienia → Treści formalne → Regulamin i inne →
        Regulamin sklepu.

      performer: Консультант

      depends_on:
        - T-4.5.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/regulamin-e-sklepu/

      result:
        - Опублікований регламент магазину

      used_by:
        - T-7.1.1

      interview_checklist:
        - Чи є у замовника готовий юридично перевірений текст регламенту магазину, чи його потрібно підготувати?
        - Хто на стороні замовника відповідає за юридичну перевірку регламенту, в тому числі щодо заборонених застережень?

      verification_checklist:
        - Перевірити, що регламент опубліковано в панелі адміністратора і він доступний покупцям.
        - Перевірити, що регламент містить обов'язкові відомості (реквізити продавця, умови повернення товару протягом 14 днів та інші).
