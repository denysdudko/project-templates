milestone: M1
name: Аналіз вимог

tasks:

# ===================================================================
# WBS-1.1 Аналіз бізнес-процесів
# ===================================================================

- wbs: WBS-1.1

  tasks:

    - id: T-1.1.1
      name: Провести інтерв'ю щодо бізнес-процесів

      description: >
        Провести інтерв'ю із замовником для визначення
        бізнес-процесів, які мають підтримуватися
        Comarch e-Sklep B2B.

      performer: Консультант

      source:
        type: Internal Project Methodology

      result:
        - Заповнений Interview Checklist з бізнес-процесів

      used_by:
        - T-1.1.2

      interview_checklist:

        - Хто є покупцем в e-Sklep (лише B2B / B2B та B2C)?
        - Як покупець отримує доступ до магазину (вільна реєстрація / підтверджувана / лише за запрошенням / імпорт з ERP)?
        - Хто підтверджує реєстрацію нового покупця, якщо підтвердження потрібне?
        - Який асортимент доступний покупцю (весь / обмежений за клієнтом)?
        - Що відбувається із замовленням після оформлення (ручна перевірка в ERP / автоматична реалізація)?

    - id: T-1.1.2
      name: Підготувати опис бізнес-процесів проєкту

      description: >
        Підготувати опис бізнес-процесів,
        що реалізуються в проєкті впровадження.

      performer: Консультант

      depends_on:
        - T-1.1.1

      source:
        type: Internal Project Methodology

      input:
        - Заповнений Interview Checklist з бізнес-процесів

      result:
        - Узгоджений опис бізнес-процесів

      used_by:
        - WBS-1.5

      verification_checklist:

        - Перевірити, що описані всі узгоджені бізнес-процеси.
        - Перевірити, що опис узгоджено із замовником.
        - Перевірити, що опис може використовуватися під час підготовки специфікації проєкту.

- wbs: WBS-1.2

  tasks:

    - id: T-1.2.1
      name: Провести інтерв'ю щодо функціональних вимог

      performer: Консультант

      source:
        type: Internal Project Methodology

      result:
        - Заповнений Interview Checklist з функціональних вимог

      used_by:
        - T-1.2.2

      interview_checklist:

        - Чи потрібне відображення індивідуальних цін?
        - Чи потрібне використання індивідуальних знижок?
        - Чи потрібне використання договірних цін?
        - Чи потрібне використання кредитного ліміту?
        - Чи потрібне використання відстрочки платежів?
        - Чи потрібне повторне оформлення замовлень?
        - Чи потрібне відображення документів з ERP?
        - Чи потрібна можливість завантаження фактур (pobrania faktur)?
        - Чи потрібне відображення стану розрахунків?
        - Чи потрібне використання декількох складів?
        - Чи потрібен покупцю доступ до історії власних замовлень?
        - Чи потрібне повторне оформлення раніше виконаних замовлень (однією кнопкою)?
        - Чи потрібне відображення документів ERP (рахунки, WZ) в особистому кабінеті?
        - Чи потрібна можливість завантаження рахунків покупцем?

    - id: T-1.2.2
      name: Підготувати перелік функціональних вимог

      performer: Консультант

      depends_on:
        - T-1.2.1

      source:
        type: Internal Project Methodology

      input:
        - Заповнений Interview Checklist з функціональних вимог

      result:
        - Узгоджений перелік функцій проєкту

      used_by:
        - WBS-6.1
        - WBS-6.2
        - WBS-6.3
        - WBS-1.5

      verification_checklist:

        - Перевірити, що всі обрані функції підтримуються Comarch e-Sklep B2B.
        - Перевірити, що вимоги узгоджені із замовником.
        - Перевірити, що перелік може використовуватися під час налаштування системи.

- wbs: WBS-1.3

  tasks:

    - id: T-1.3.1
      name: Провести інтерв'ю щодо інтеграцій

      performer: Консультант

      source:
        type: Internal Project Methodology

      result:
        - Заповнений Interview Checklist з інтеграцій

      used_by:
        - T-1.3.2

      interview_checklist:

        - Чи потрібна інтеграція з Comarch ERP Optima?
        - Які способи оплати необхідно підключити?
        - Які служби доставки необхідно підключити?
        - Чи потрібна інтеграція з Allegro?
        - Чи потрібна інтеграція з Ceneo?
        - Чи потрібна інтеграція з Google Analytics?
        - Чи входить інтеграція з маркетплейсами (Comarch e-Sale, Allegro, Ceneo) до обсягу цього проєкту?

    - id: T-1.3.2
      name: Підготувати перелік інтеграцій проєкту

      performer: Консультант

      depends_on:
        - T-1.3.1

      source:
        type: Internal Project Methodology

      input:
        - Заповнений Interview Checklist з інтеграцій

      result:
        - Узгоджений перелік інтеграцій

      used_by:
        - WBS-6.4
        - WBS-1.5

      verification_checklist:

        - Перевірити, що визначені всі інтеграції проєкту.
        - Перевірити, що інтеграції узгоджені із замовником.

- wbs: WBS-1.4

  tasks:

    - id: T-1.4.1
      name: Провести аналіз готовності даних ERP

      performer: Консультант

      source:
        type: Internal Project Methodology

      result:
        - Звіт про готовність даних ERP

      used_by:
        - WBS-5.1
        - WBS-5.2
        - WBS-5.3
        - WBS-5.4
        - WBS-1.5

      interview_checklist:

        - Чи підготовлені товари до публікації?
        - Чи підготовлені категорії товарів?
        - Чи заповнені фотографії товарів?
        - Чи заповнені описи товарів?
        - Чи заповнені атрибути товарів?
        - Чи заповнені виробники товарів?
        - Чи використовуються індивідуальні ціни?
        - Чи використовуються знижки покупців?

      verification_checklist:

        - Перевірити, що визначено обсяг підготовки даних.
        - Перевірити, що виявлено відсутні дані.
        - Перевірити, що сформовано перелік робіт з підготовки даних.

- wbs: WBS-1.5

  tasks:

    - id: T-1.5.1
      name: Підготувати специфікацію проєкту

      performer: Консультант

      source:
        type: Internal Project Methodology

      depends_on:
        - T-1.1.2
        - T-1.2.2
        - T-1.3.2
        - T-1.4.1

      input:
        - Узгоджений опис бізнес-процесів
        - Узгоджений перелік функцій проєкту
        - Узгоджений перелік інтеграцій
        - Звіт про готовність даних ERP

      result:
        - Проєкт специфікації впровадження

      used_by:
        - T-1.5.2

    - id: T-1.5.2
      name: Узгодити специфікацію проєкту

      performer: Консультант

      depends_on:
        - T-1.5.1

      source:
        type: Internal Project Methodology

      input:
        - Проєкт специфікації впровадження

      result:
        - Затверджена специфікація проєкту

      used_by:
        - T-2.1.1
        - T-4.1.1
        - T-5.1.1
        - T-6.1.1

      verification_checklist:

        - Перевірити, що специфікація містить усі узгоджені вимоги.
        - Перевірити, що всі зауваження замовника опрацьовані.
        - Перевірити, що специфікація затверджена замовником.
