milestone: M6
name: Налаштування B2B та інтеграцій

tasks:

# ===================================================================
# WBS-6.1 Налаштування функцій B2B
# ===================================================================

- wbs: WBS-6.1

  tasks:

    - id: T-6.1.1
      name: Узгодити параметри реєстрації покупців для B2B

      description: >
        Узгодити із замовником налаштування реєстрації в розділі
        Ustawienia → Klienci → Ustawienia rejestracji: чи потрібна
        модерація реєстрації адміністратором ("Administrator
        musi zaakceptować konto"), чи потрібен механізм масового
        створення облікових записів для контрагентів, які вже
        існують в ERP Optima.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/jak-skonfigurowac-sklep-pod-obsluge-b2b/

      result:
        - Узгоджені параметри реєстрації покупців

      used_by:
        - T-6.1.4

      interview_checklist:
        - Чи повинен адміністратор підтверджувати кожну реєстрацію нового покупця вручну?
        - Чи потрібно масово створити облікові записи для контрагентів, які вже існують в ERP Optima (за даними з ERP чи файлу Excel)?
        - Чи має реєстрація бути відкрита для всіх, чи доступ надається лише обраним партнерам?

      verification_checklist:
        - Перевірити, що параметри реєстрації узгоджено із замовником.

    - id: T-6.1.2
      name: Узгодити обмеження на оформлення замовлень для B2B

      description: >
        Узгодити із замовником, чи має покупка бути доступна
        лише зареєстрованим компаніям (без гостьових замовлень),
        а також чи потрібна мінімальна сума замовлення, від якої
        приймаються замовлення.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/jak-skonfigurowac-sklep-pod-obsluge-b2b/

      result:
        - Узгоджені обмеження на оформлення замовлень

      used_by:
        - T-6.1.4

      interview_checklist:
        - Чи має покупка бути доступна лише зареєстрованим компаніям, без можливості гостьового оформлення замовлення?
        - Чи потрібна мінімальна сума замовлення, за якої замовлення приймається до виконання?

      verification_checklist:
        - Перевірити, що обмеження на оформлення замовлень узгоджено із замовником.

    - id: T-6.1.3
      name: Узгодити видимість цін для незареєстрованих користувачів

      description: >
        Узгодити із замовником, чи мають ціни товарів бути
        приховані від користувачів, які не увійшли до особистого
        кабінету (типова для B2B поведінка, на відміну від
        роздрібної моделі, де ціна загальнодоступна).

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/jak-skonfigurowac-sklep-pod-obsluge-b2b/

      result:
        - Узгоджене рішення щодо видимості цін для незареєстрованих користувачів

      used_by:
        - T-6.1.4

      interview_checklist:
        - Чи мають ціни товарів бути приховані для користувачів, які не увійшли до особистого кабінету?

      verification_checklist:
        - Перевірити, що рішення про видимість цін узгоджено із замовником.

    - id: T-6.1.4
      name: Налаштувати параметри реєстрації, замовлень і видимості цін у панелі адміністратора

      description: >
        У панелі адміністратора e-Sklep внести узгоджені
        налаштування реєстрації (Ustawienia → Klienci → Ustawienia
        rejestracji), обмеження на оформлення замовлень і
        видимість цін для незареєстрованих користувачів,
        згідно з рішеннями T-6.1.1 – T-6.1.3.

      performer: Консультант

      depends_on:
        - T-6.1.1
        - T-6.1.2
        - T-6.1.3

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/jak-skonfigurowac-sklep-pod-obsluge-b2b/

      result:
        - Налаштовані параметри реєстрації, замовлень і видимості цін

      used_by:
        - WBS-6.5

      interview_checklist: []

      verification_checklist:
        - Перевірити, що налаштування реєстрації відповідають узгодженим у T-6.1.1.
        - Перевірити, що обмеження на замовлення відповідають узгодженим у T-6.1.2.
        - Перевірити, що видимість цін для незареєстрованих користувачів відповідає узгодженій у T-6.1.3.

# ===================================================================
# WBS-6.2 Налаштування цін і знижок B2B
# ===================================================================

- wbs: WBS-6.2

  tasks:

    - id: T-6.2.1
      name: Узгодити модель індивідуальних цін і знижок для контрагентів

      description: >
        Узгодити із замовником, яким контрагентам або групам
        контрагентів мають призначатися індивідуальні ціни (типу
        "stała cena") чи відсоткові знижки, а також чи потрібні
        строкові (тимчасові) знижки з датами початку/закінчення.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/rabaty-z-comarch-erp-optima/

      result:
        - Узгоджена модель індивідуальних цін і знижок

      used_by:
        - T-6.2.2

      interview_checklist:
        - Яким контрагентам або групам контрагентів мають бути призначені індивідуальні ціни чи знижки?
        - Чи потрібні знижки типу "фіксована ціна" (stała cena), чи достатньо відсоткових знижок?
        - Чи потрібні строкові знижки з датою початку та/або закінчення дії?

      verification_checklist:
        - Перевірити, що модель індивідуальних цін і знижок узгоджено із замовником.

    - id: T-6.2.2
      name: Налаштувати індивідуальні ціни та знижки в ERP Optima

      description: >
        У розділі Ogólne/Rabaty (або Ogólne/Cennik для конкретних
        товарів) створити узгоджені знижки та/або фіксовані
        ціни для відповідних контрагентів або груп
        контрагентів, включно з датами початку/закінчення для строкових
        знижок.

      performer: Консультант

      depends_on:
        - T-6.2.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026_5/dokumentacja/jak-ustawic-indywidualne-ceny-dla-kontrahentow/

      result:
        - Створені в ERP Optima індивідуальні ціни та знижки

      used_by:
        - T-6.2.3

      interview_checklist: []

      verification_checklist:
        - Перевірити, що створені знижки/ціни відповідають узгодженій моделі (T-6.2.1).
        - Перевірити, що дати початку/закінчення знижок задані коректно там, де це потрібно.

    - id: T-6.2.3
      name: Прив'язати індивідуальний цінник до картки контрагента

      description: >
        На картці контрагента в ERP Optima (вкладка e-Sklep)
        зазначити тип відображуваної ціни (індивідуальний цінник),
        щоб відповідний контрагент бачив свої ціни після
        входу до особистого кабінету e-Sklep.

      performer: Консультант

      depends_on:
        - T-6.2.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/indywidualne-cenniki-dla-kontrahentow/

      result:
        - Прив'язаний до контрагентів індивідуальний цінник

      used_by:
        - T-6.2.5

      interview_checklist: []

      verification_checklist:
        - Перевірити, що на картках узгоджених контрагентів зазначено коректний цінник на вкладці e-Sklep.

    - id: T-6.2.4
      name: Увімкнути розрахунок знижок з ERP у панелі адміністратора e-Sklep

      description: >
        У панелі адміністратора e-Sklep у розділі Ustawienia →
        Ustawienia sklepu → Ceny i rabaty увімкнути параметр
        "Sposób liczenia rabatów w koszyku", щоб знижки,
        передані з ERP Optima, застосовувалися в кошику покупця.

      performer: Консультант

      depends_on:
        - T-6.2.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/rabaty-z-comarch-erp-optima/

      result:
        - Увімкнений розрахунок знижок з ERP у кошику e-Sklep

      used_by:
        - T-6.2.5

      interview_checklist: []

      verification_checklist:
        - Перевірити, що параметр розрахунку знижок у кошику увімкнено.

    - id: T-6.2.5
      name: Виконати синхронізацію та перевірити відображення цін і знижок

      description: >
        Виконати синхронізацію (ручну або різницеву) для
        передачі цін, знижок і даних контрагентів в e-Sklep, і
        перевірити, що налаштовані ціни та знижки коректно
        відображаються в панелі адміністратора (Marketing → Rabaty)
        і в контрагента після входу до особистого кабінету.

      performer: Консультант

      depends_on:
        - T-6.2.3
        - T-6.2.4

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/rabaty-z-comarch-erp-optima/

      result:
        - Підтверджене коректне відображення цін і знижок

      used_by:
        - WBS-6.5

      interview_checklist: []

      verification_checklist:
        - Перевірити, що знижки видно в панелі адміністратора в розділі Marketing → Rabaty (вкладки "Rabat z Comarch ERP Optima" і "Stała cena z Comarch ERP Optima").
        - Перевірити, що контрагент після входу бачить ціни та знижки згідно з призначеним цінником.

# ===================================================================
# WBS-6.3 Налаштування умов співпраці
# ===================================================================

- wbs: WBS-6.3

  tasks:

    - id: T-6.3.1
      name: Узгодити умови співпраці (кредитний ліміт і ліміт прострочених платежів)

      description: >
        Узгодити із замовником, яким контрагентам має бути
        присвоєно кредитний ліміт та/або ліміт прострочених платежів,
        а також який режим контролю ліміту має застосовуватися при
        оформленні замовлення (без дії, попередження, блокування).

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/limit-kredytu-i-limit-przeterminowanych-platnosci/

      result:
        - Узгоджені умови співпраці (ліміти та режим контролю)

      used_by:
        - T-6.3.2

      interview_checklist:
        - Яким контрагентам має бути присвоєно кредитний ліміт?
        - Яким контрагентам має бути присвоєно ліміт прострочених платежів?
        - "Який режим контролю ліміту платежів має застосовуватися при оформленні замовлення: без дії, попередження чи блокування?"

      verification_checklist:
        - Перевірити, що умови співпраці узгоджено із замовником.

    - id: T-6.3.2
      name: Встановити ліміти на картках контрагентів в ERP Optima

      description: >
        На картці контрагента зі статусом "podmiot gospodarczy"
        в ERP Optima встановити узгоджені значення "Limit
        kredytu" та/або "Limit przeterminowanych płatności".

      performer: Консультант

      depends_on:
        - T-6.3.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/limit-kredytu-i-limit-przeterminowanych-platnosci/

      result:
        - Встановлені ліміти на картках контрагентів

      used_by:
        - T-6.3.3

      interview_checklist: []

      verification_checklist:
        - Перевірити, що ліміти встановлено на картках узгоджених контрагентів.

    - id: T-6.3.3
      name: Увімкнути відображення лімітів в особистому кабінеті e-Sklep

      description: >
        У панелі адміністратора e-Sklep у розділі Ustawienia →
        Ustawienia sklepu → Klienci увімкнути параметр "Limity
        kredytu i płatności", щоб контрагенти бачили свій
        доступний ліміт і суму прострочених платежів в особистому
        кабінеті (Strefa klienta).

      performer: Консультант

      depends_on:
        - T-6.3.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/limit-kredytu-i-limit-przeterminowanych-platnosci/

      result:
        - Увімкнене відображення лімітів в особистому кабінеті

      used_by:
        - T-6.3.4

      interview_checklist: []

      verification_checklist:
        - Перевірити, що параметр "Limity kredytu i płatności" увімкнено.
        - Перевірити, що режим контролю ліміту платежів, налаштований у T-2.4.2, відповідає узгодженому в T-6.3.1.

    - id: T-6.3.4
      name: Перевірити відображення та контроль лімітів після синхронізації

      description: >
        Виконати синхронізацію контрагентів і перевірити, що
        ліміт кредиту та ліміт прострочених платежів відображаються
        в особистому кабінеті e-Sklep для контрагента, а також що при
        перевищенні ліміту застосовується узгоджений режим контролю
        при оформленні замовлення з відкладеною формою оплати.

      performer: Консультант

      depends_on:
        - T-6.3.3

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/limit-kredytu-i-limit-przeterminowanych-platnosci/

      result:
        - Підтверджена робота відображення та контролю лімітів

      used_by:
        - WBS-6.5

      interview_checklist: []

      verification_checklist:
        - Перевірити, що ліміти відображаються в особистому кабінеті контрагента (Strefa klienta).
        - Перевірити, що при перевищенні ліміту система реагує згідно з узгодженим режимом контролю (T-6.3.1).

# ===================================================================
# WBS-6.4 Налаштування інтеграцій
# ===================================================================

- wbs: WBS-6.4

  tasks:

    - id: T-6.4.1
      name: Уточнити перелік інтеграцій, що підлягають налаштуванню на цьому етапі

      description: >
        Звести перелік інтеграцій, узгоджений у завданні T-1.3.2
        (M1), з фактично доступними для e-Sklep B2B інтеграціями
        (розділ Integracje в панелі адміністратора і
        відповідна категорія офіційної документації), і
        підтвердити, які з них будуть налаштовані в рамках проєкту.

      performer: Консультант

      depends_on:
        - T-1.3.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/kategoria/integracje/

      result:
        - Підтверджений перелік інтеграцій для налаштування

      used_by:
        - T-6.4.2

      interview_checklist: []

      verification_checklist:
        - Перевірити, що перелік інтеграцій для налаштування відповідає узгодженому в T-1.3.2.
        - Перевірити, що для кожної інтеграції визначено офіційну статтю документації Comarch, яка описує її налаштування.

    - id: T-6.4.2
      name: Налаштувати узгоджені інтеграції згідно з їх офіційною документацією

      description: >
        Для кожної інтеграції з переліку, підтвердженого в
        T-6.4.1, виконати налаштування в панелі адміністратора
        e-Sklep (розділ Integracje) строго за відповідною
        офіційною статтею документації Comarch для цієї
        інтеграції.

      performer: Консультант

      depends_on:
        - T-6.4.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/kategoria/integracje/

      result:
        - Налаштовані та активні інтеграції

      used_by:
        - WBS-6.5

      interview_checklist: []

      verification_checklist:
        - Перевірити, що кожна узгоджена інтеграція налаштована та активна в розділі Integracje.
        - Перевірити, що налаштування кожної інтеграції виконано відповідно до її офіційної документації Comarch.

# ===================================================================
# WBS-6.5 Перевірка функцій B2B та інтеграцій
# ===================================================================

- wbs: WBS-6.5

  tasks:

    - id: T-6.5.1
      name: Перевірити коректність роботи функцій B2B та інтеграцій

      description: >
        Звести результати налаштування функцій B2B (WBS-6.1), цін і
        знижок (WBS-6.2), умов співпраці (WBS-6.3) та
        інтеграцій (WBS-6.4), і підтвердити їх спільну
        коректну роботу перед етапом тестування та приймання.

      performer: Консультант

      depends_on:
        - T-6.1.4
        - T-6.2.5
        - T-6.3.4
        - T-6.4.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/kategoria/b2b/

      result:
        - Підтверджена готовність функцій B2B та інтеграцій

      used_by:
        - T-7.1.1

