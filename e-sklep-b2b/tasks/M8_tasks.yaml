milestone: M8
name: Обучение пользователей

tasks:

# ===================================================================
# WBS-8.1 Подготовка обучения
# ===================================================================

- wbs: WBS-8.1

  tasks:

    - id: T-8.1.1
      name: Определить состав участников и формат обучения

      description: >
        Согласовать с заказчиком, кто из сотрудников должен пройти
        обучение работе с e-Sklep, и в каком формате его провести
        (очно, онлайн, количество сессий).

      performer: Консультант

      source:
        type: Internal Project Methodology

      result:
        - Согласованный состав участников и формат обучения

      used_by:
        - T-8.1.2

      interview_checklist:
        - Кто из сотрудников заказчика должен пройти обучение работе с e-Sklep?
        - "В каком формате удобно провести обучение: очно, онлайн, в несколько сессий?"

      verification_checklist:
        - Проверить, что состав участников и формат обучения согласованы с заказчиком.

    - id: T-8.1.2
      name: Подготовить материалы и сценарий обучения

      description: >
        Подготовить материалы для обучения на основе итоговой
        конфигурации системы, настроенной в M2–M6, и официальных
        обучающих материалов Comarch, включая сценарий из трёх
        частей: презентация возможностей, разбор рабочих сценариев,
        вопросы и ответы.

      performer: Консультант

      depends_on:
        - T-8.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/kategoria/jak-zaczac/

      result:
        - Подготовленные материалы и сценарий обучения

      used_by:
        - WBS-8.2

      interview_checklist: []

      verification_checklist:
        - Проверить, что материалы отражают именно настроенную для заказчика конфигурацию, а не типовую демо-версию.
        - "Проверить, что сценарий включает все три части: презентацию возможностей, разбор сценариев, вопросы и ответы."

# ===================================================================
# WBS-8.2 Проведение обучения
# ===================================================================

- wbs: WBS-8.2

  tasks:

    - id: T-8.2.1
      name: Провести презентацию возможностей системы

      description: >
        Провести для участников обучения презентацию основных
        возможностей настроенного e-Sklep (каталог, оформление
        заказа, оплата, доставка, личный кабинет B2B) по
        подготовленному сценарию.

      performer: Консультант

      depends_on:
        - T-8.1.2

      source:
        type: Internal Project Methodology

      result:
        - Проведенная презентация возможностей системы

      used_by:
        - T-8.2.2

      interview_checklist: []

      verification_checklist:
        - Проверить, что презентация охватывает все разделы, согласованные в T-8.1.2.
        - Проверить, что все участники, определенные в T-8.1.1, присутствовали на презентации.

    - id: T-8.2.2
      name: Разобрать с пользователями типовые рабочие сценарии

      description: >
        Разобрать с участниками обучения типовые сценарии их
        повседневной работы в системе (обработка заказа, работа
        с ценами и лимитами B2B, работа с уведомлениями),
        используя реальные данные настроенного магазина.

      performer: Консультант

      depends_on:
        - T-8.2.1

      source:
        type: Internal Project Methodology

      result:
        - Разобранные с пользователями рабочие сценарии

      used_by:
        - T-8.2.3

      interview_checklist: []

      verification_checklist:
        - Проверить, что разобранные сценарии соответствуют функциям, которые пользователи будут использовать в повседневной работе.

    - id: T-8.2.3
      name: Ответить на вопросы участников обучения

      description: >
        Провести сессию вопросов и ответов по итогам обучения,
        зафиксировать вопросы, на которые не удалось ответить
        сразу, для последующей проработки.

      performer: Консультант

      depends_on:
        - T-8.2.2

      source:
        type: Internal Project Methodology

      result:
        - Зафиксированные ответы и открытые вопросы участников

      used_by:
        - WBS-8.3

      interview_checklist: []

      verification_checklist:
        - Проверить, что все заданные вопросы зафиксированы.
        - Проверить, что на каждый вопрос дан ответ либо назначен ответственный и срок для дальнейшей проработки.

# ===================================================================
# WBS-8.3 Подтверждение готовности пользователей
# ===================================================================

- wbs: WBS-8.3

  tasks:

    - id: T-8.3.1
      name: Собрать подтверждение готовности от участников обучения

      description: >
        Собрать от участников обучения подтверждение того, что они
        понимают порядок работы с системой и готовы приступить к
        эксплуатации, а также закрыть открытые вопросы,
        зафиксированные в T-8.2.3.

      performer: Консультант

      depends_on:
        - T-8.2.3

      source:
        type: Internal Project Methodology

      result:
        - Подтвержденная готовность пользователей к эксплуатации

      used_by:
        - M9

      interview_checklist:
        - Остались ли у участников обучения открытые вопросы, требующие проработки перед запуском?

      verification_checklist:
        - Проверить, что открытые вопросы из T-8.2.3 закрыты.
        - Проверить, что участники подтвердили готовность к самостоятельной работе с системой.
