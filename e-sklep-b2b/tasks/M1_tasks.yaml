milestone: M1
name: Анализ требований

tasks:

# ===================================================================
# WBS-1.1 Анализ бизнес-процессов
# ===================================================================

- wbs: WBS-1.1

  tasks:

    - id: T-1.1.1
      name: Провести интервью по бизнес-процессам

      description: >
        Провести интервью с заказчиком для определения
        бизнес-процессов, которые должны поддерживаться
        Comarch e-Sklep B2B.

      performer: Консультант

      source:
        type: Internal Project Methodology

      result:
        - Заполненный Interview Checklist по бизнес-процессам

      used_by:
        - T-1.1.2

      interview_checklist:

        - Кто является покупателем в e-Sklep (только B2B / B2B и B2C)?
        - Как покупатель получает доступ к магазину (свободная регистрация / подтверждаемая / только приглашение / импорт из ERP)?
        - Кто подтверждает регистрацию нового покупателя, если подтверждение требуется?
        - Какой ассортимент доступен покупателю (весь / ограниченный по клиенту)?
        - Что происходит с заказом после оформления (ручная проверка в ERP / автоматическая реализация)?

    - id: T-1.1.2
      name: Подготовить описание бизнес-процессов проекта

      description: >
        Подготовить описание бизнес-процессов,
        реализуемых в проекте внедрения.

      performer: Консультант

      depends_on:
        - T-1.1.1

      source:
        type: Internal Project Methodology

      input:
        - Заполненный Interview Checklist по бизнес-процессам

      result:
        - Согласованное описание бизнес-процессов

      used_by:
        - WBS-1.5

      verification_checklist:

        - Проверить, что описаны все согласованные бизнес-процессы.
        - Проверить, что описание согласовано заказчиком.
        - Проверить, что описание может использоваться при подготовке спецификации проекта.

- wbs: WBS-1.2

  tasks:

    - id: T-1.2.1
      name: Провести интервью по функциональным требованиям

      performer: Консультант

      source:
        type: Internal Project Methodology

      result:
        - Заполненный Interview Checklist по функциональным требованиям

      used_by:
        - T-1.2.2

      interview_checklist:

        - Требуется ли отображение индивидуальных цен?
        - Требуется ли использование индивидуальных скидок?
        - Требуется ли использование договорных цен?
        - Требуется ли использование кредитного лимита?
        - Требуется ли использование отсрочки платежей?
        - Требуется ли повторное оформление заказов?
        - Требуется ли отображение документов из ERP?
        - Требуется ли возможность pobrania faktur?
        - Требуется ли отображение состояния расчетов?
        - Требуется ли использование нескольких складов?
        - Требуется ли доступ покупателя к истории собственных заказов?
        - Требуется ли повторное оформление ранее выполненных заказов (одной кнопкой)?
        - Требуется ли отображение документов ERP (счета, WZ) в личном кабинете?
        - Требуется ли возможность скачивания счетов покупателем?

    - id: T-1.2.2
      name: Подготовить перечень функциональных требований

      performer: Консультант

      depends_on:
        - T-1.2.1

      source:
        type: Internal Project Methodology

      input:
        - Заполненный Interview Checklist по функциональным требованиям

      result:
        - Согласованный перечень функций проекта

      used_by:
        - WBS-6.1
        - WBS-6.2
        - WBS-6.3
        - WBS-1.5

      verification_checklist:

        - Проверить, что все выбранные функции поддерживаются Comarch e-Sklep B2B.
        - Проверить, что требования согласованы заказчиком.
        - Проверить, что перечень может использоваться при настройке системы.

- wbs: WBS-1.3

  tasks:

    - id: T-1.3.1
      name: Провести интервью по интеграциям

      performer: Консультант

      source:
        type: Internal Project Methodology

      result:
        - Заполненный Interview Checklist по интеграциям

      used_by:
        - T-1.3.2

      interview_checklist:

        - Требуется ли интеграция с Comarch ERP Optima?
        - Какие способы оплаты необходимо подключить?
        - Какие службы доставки необходимо подключить?
        - Требуется ли интеграция с Allegro?
        - Требуется ли интеграция с Ceneo?
        - Требуется ли интеграция с Google Analytics?
        - Входит ли интеграция с маркетплейсами (Comarch e-Sale, Allegro, Ceneo) в объём этого проекта?

    - id: T-1.3.2
      name: Подготовить перечень интеграций проекта

      performer: Консультант

      depends_on:
        - T-1.3.1

      source:
        type: Internal Project Methodology

      input:
        - Заполненный Interview Checklist по интеграциям

      result:
        - Согласованный перечень интеграций

      used_by:
        - WBS-6.4
        - WBS-1.5

      verification_checklist:

        - Проверить, что определены все интеграции проекта.
        - Проверить, что интеграции согласованы заказчиком.

- wbs: WBS-1.4

  tasks:

    - id: T-1.4.1
      name: Провести анализ готовности данных ERP

      performer: Консультант

      source:
        type: Internal Project Methodology

      result:
        - Отчет о готовности данных ERP

      used_by:
        - WBS-5.1
        - WBS-5.2
        - WBS-5.3
        - WBS-5.4
        - WBS-1.5

      interview_checklist:

        - Подготовлены ли товары к публикации?
        - Подготовлены ли категории товаров?
        - Заполнены ли фотографии товаров?
        - Заполнены ли описания товаров?
        - Заполнены ли атрибуты товаров?
        - Заполнены ли производители товаров?
        - Используются ли индивидуальные цены?
        - Используются ли скидки покупателей?

      verification_checklist:

        - Проверить, что определен объем подготовки данных.
        - Проверить, что выявлены отсутствующие данные.
        - Проверить, что сформирован перечень работ по подготовке данных.

- wbs: WBS-1.5

  tasks:

    - id: T-1.5.1
      name: Подготовить спецификацию проекта

      performer: Консультант

      source:
        type: Internal Project Methodology

      depends_on:
        - T-1.1.2
        - T-1.2.2
        - T-1.3.2
        - T-1.4.1

      input:
        - Согласованное описание бизнес-процессов
        - Согласованный перечень функций проекта
        - Согласованный перечень интеграций
        - Отчет о готовности данных ERP

      result:
        - Проект спецификации внедрения

      used_by:
        - T-1.5.2

    - id: T-1.5.2
      name: Согласовать спецификацию проекта

      performer: Консультант

      depends_on:
        - T-1.5.1

      source:
        type: Internal Project Methodology

      input:
        - Проект спецификации внедрения

      result:
        - Утвержденная спецификация проекта

      used_by:
        - T-2.1.1
        - T-4.1.1
        - T-5.1.1
        - T-6.1.1

      verification_checklist:

        - Проверить, что спецификация содержит все согласованные требования.
        - Проверить, что все замечания заказчика обработаны.
        - Проверить, что спецификация утверждена заказчиком.
