milestone: M3
name: Підключення e-Sklep

tasks:

# ===================================================================
# WBS-3.1 Підключення e-Sklep до ERP
# ===================================================================

- wbs: WBS-3.1

  tasks:

    - id: T-3.1.1
      name: Створити нове стенд-підключення e-Sklep у конфігурації ERP Optima

      description: >
        У розділі System → Konfiguracja → Firma → Ogólne → e-Handel,
        на вкладці "e-Sklep/e-Sale", натиснути кнопку додавання нового
        магазину, що відкриє форму конфігурації з вкладками Ogólne,
        Zasoby і Dodatkowe.

      performer: Консультант

      depends_on:
        - T-2.4.3

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026_5/dokumentacja/formularz-comarch-e-sklep/

      result:
        - Створена (незаповнена) картка стенда e-Sklep в ERP Optima

      used_by:
        - T-3.1.2

      interview_checklist: []

      verification_checklist:
        - "Перевірити, що форма конфігурації нового магазину відкрилася і містить три вкладки: Ogólne, Zasoby, Dodatkowe."

    - id: T-3.1.2
      name: Заповнити вкладку "Ogólne" даними, узгодженими в M2

      description: >
        Внести на вкладці Ogólne значення "Nazwa sklepu", "Domyślna
        waluta", "Dostępne waluty" (якщо потрібно), "Cena domyślna",
        "Cena poprzednia" (якщо використовується), "Pomijaj towary z ceną
        0,00" (якщо потрібно), "Definicja RO", "Seria" і "Koszt
        przesyłki" — згідно з рішеннями завдань T-2.2.1 і T-2.2.2.

      performer: Консультант

      depends_on:
        - T-3.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026_5/dokumentacja/formularz-comarch-e-sklep/

      result:
        - Заповнена вкладка Ogólne форми Comarch e-Sklep

      used_by:
        - T-3.1.3

      interview_checklist: []

      verification_checklist:
        - Перевірити, що всі значення на вкладці Ogólne відповідають рішенням, узгодженим у T-2.2.1 і T-2.2.2.
        - Перевірити, що поле "Koszt przesyłki" заповнене — це обов'язкове поле.

    - id: T-3.1.3
      name: Згенерувати ключ обміну (вкладка "Dodatkowe")

      description: >
        На вкладці Dodatkowe натиснути значок "Generuj klucz wymiany" і
        ввести назву компанії, назву магазину та PIN, отримані
        раніше (T-2.1.2), щоб встановити технічне підключення до
        Comarch e-Sklep.

      performer: Консультант

      depends_on:
        - T-3.1.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026_5/dokumentacja/formularz-comarch-e-sklep/

      result:
        - Згенерований і прийнятий ключ обміну

      used_by:
        - T-3.2.1

      interview_checklist: []

      verification_checklist:
        - Перевірити, що ключ обміну згенеровано без помилки авторизації.
        - Перевірити, що програма не видала повідомлення про невірні дані (назву компанії, магазину чи PIN).

# ===================================================================
# WBS-3.2 Налаштування параметрів підключення
# ===================================================================

- wbs: WBS-3.2

  tasks:

    - id: T-3.2.1
      name: Заповнити вкладку "Zasoby" даними, узгодженими в M2

      description: >
        Внести на вкладці Zasoby значення "Grupa towarów", "Wyślij
        zasoby", "Stany na dzień" і перелік "Magazyny" із зазначенням
        магазину за замовчуванням — згідно з рішеннями завдань T-2.3.1 і
        T-2.3.2.

      performer: Консультант

      depends_on:
        - T-3.1.3

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026_5/dokumentacja/formularz-comarch-e-sklep/

      result:
        - Заповнена вкладка Zasoby форми Comarch e-Sklep

      used_by:
        - T-3.2.2

      interview_checklist: []

      verification_checklist:
        - Перевірити, що групу товарів зазначено і вона відповідає узгодженій у T-2.3.1.
        - Перевірити, що список складів відповідає узгодженому в T-2.3.2 і що рівно один склад позначено як склад за замовчуванням.

    - id: T-3.2.2
      name: Заповнити вкладку "Dodatkowe" рештою параметрів підключення

      description: >
        Внести на вкладці Dodatkowe зіставлення способів оплати
        (Standardowe та, за потреби, Online) — згідно з T-2.4.1,
        а також параметри "Mapuj kontrahentów", "Grupa kontrahenta" і
        "Kontrola limitu płatności" — згідно з T-2.4.2.

      performer: Консультант

      depends_on:
        - T-3.2.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026_5/dokumentacja/formularz-comarch-e-sklep/

      result:
        - Заповнена вкладка Dodatkowe форми Comarch e-Sklep

      used_by:
        - T-3.2.3

      interview_checklist: []

      verification_checklist:
        - Перевірити, що зіставлення способів оплати відповідає узгодженому в T-2.4.1.
        - Перевірити, що параметри Mapuj kontrahentów, Grupa kontrahenta і Kontrola limitu płatności відповідають узгодженим у T-2.4.2.

    - id: T-3.2.3
      name: Зберегти конфігурацію підключення e-Sklep

      description: >
        Зберегти заповнену форму конфігурації Comarch e-Sklep
        (вкладки Ogólne, Zasoby, Dodatkowe) в ERP Optima.

      performer: Консультант

      depends_on:
        - T-3.2.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026_5/dokumentacja/formularz-comarch-e-sklep/

      result:
        - Збережена конфігурація підключення e-Sklep

      used_by:
        - T-3.3.1

      interview_checklist: []

      verification_checklist:
        - Перевірити, що форму збережено без повідомлень про помилку.
        - Перевірити, що новий магазин відображається у списку e-Sklep/e-Sale зі статусом "активний" (не позначений як Nieaktywny).

# ===================================================================
# WBS-3.3 Перевірка підключення
# ===================================================================

- wbs: WBS-3.3

  tasks:

    - id: T-3.3.1
      name: Виконати тестову ручну синхронізацію

      description: >
        Запустити ручну синхронізацію (іконка e-Handel в меню Handel)
        з параметрами за замовчуванням ("Wyślij ofertę do e-Sklepu",
        "Pobierz zamówienia z e-Sklepu"), щоб перевірити
        працездатність створеного підключення.

      performer: Консультант

      depends_on:
        - T-3.2.3

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026_5/dokumentacja/wspolpraca-z-comarch-e-sklep/

      result:
        - Звіт про результати тестової синхронізації

      used_by:
        - T-3.3.2

      interview_checklist: []

      verification_checklist:
        - Перевірити, що синхронізація завершилася без повідомлень про помилку.
        - Перевірити, що програма не повідомила про конфлікт одночасної синхронізації (ручної/автоматичної).

    - id: T-3.3.2
      name: Підтвердити готовність підключення до базового налаштування магазину

      description: >
        Звести результати тестової синхронізації (T-3.3.1) і
        збереженої конфігурації (T-3.2.3) і зафіксувати, що
        підключення ERP Optima ↔ Comarch e-Sklep встановлено і
        працездатне.

      performer: Консультант

      depends_on:
        - T-3.3.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026_5/dokumentacja/formularz-comarch-e-sklep/

      result:
        - Підтверджене працездатне підключення e-Sklep до ERP Optima

      used_by:
        - T-4.1.1

      interview_checklist: []

      verification_checklist:
        - Перевірити, що тестову синхронізацію виконано успішно (T-3.3.1).
        - Перевірити, що валюта за замовчуванням зафіксована і відповідає узгодженій в M2 (після першої синхронізації змінити її неможливо).
        - Перевірити, що статус магазину у списку e-Sklep/e-Sale — активний.
