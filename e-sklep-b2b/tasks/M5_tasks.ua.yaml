milestone: M5
name: Підготовка даних

tasks:

# ===================================================================
# WBS-5.1 Підготовка товарів
# ===================================================================

- wbs: WBS-5.1

  tasks:

    - id: T-5.1.1
      name: Узгодити перелік товарів і параметри їх публікації

      description: >
        Узгодити із замовником перелік товарів, які мають
        бути опубліковані в e-Sklep, параметр "Status dostępności"
        (статус наявності) і спосіб визначення "Cena i koszt
        dostawy" (за налаштуваннями e-Sklep, за домовленістю з
        клієнтом, або фіксованою вартістю) для товарів.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dodawanie-towarow-w-erp-optima/

      result:
        - Узгоджений перелік товарів для публікації та параметри статусу/доставки

      used_by:
        - T-5.1.2

      interview_checklist:
        - Чи всі товари компанії мають публікуватися в e-Sklep, чи лише частина асортименту?
        - Який статус доступності має відображатися для товарів (негайна відправка, тривалий термін очікування тощо)?
        - "Яким чином має визначатися вартість доставки товару: за налаштуваннями e-Sklep, за домовленістю з клієнтом, або фіксованою сумою?"

      verification_checklist:
        - Перевірити, що перелік товарів для публікації узгоджено із замовником.
        - Перевірити, що для товарів визначено статус доступності та спосіб розрахунку вартості доставки.

    - id: T-5.1.2
      name: Увімкнути ознаку "Udostępniaj w Comarch e-Sklep/e-Sale" на картках товарів

      description: >
        На картках товарів (або за допомогою операції серійних
        змін) в ERP Optima встановити ознаку "Udostępniaj w
        Comarch e-Sklep/e-Sale", заповнити "Status dostępności" і
        параметри "Cena i koszt dostawy" згідно з рішеннями,
        узгодженими в T-5.1.1.

      performer: Консультант

      depends_on:
        - T-5.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dodawanie-towarow-w-erp-optima/

      result:
        - Товари зі встановленою ознакою публікації та заповненими параметрами доставки

      used_by:
        - T-5.5.1

      interview_checklist: []

      verification_checklist:
        - Перевірити, що ознаку "Udostępniaj w Comarch e-Sklep/e-Sale" встановлено для всіх узгоджених товарів.
        - Перевірити, що статус доступності та спосіб розрахунку вартості доставки заповнені згідно з рішенням T-5.1.1.

# ===================================================================
# WBS-5.2 Підготовка структури каталогу
# ===================================================================

- wbs: WBS-5.2

  tasks:

    - id: T-5.2.1
      name: Узгодити структуру груп товарів (дерево категорій) для e-Sklep

      description: >
        Узгодити із замовником дерево груп і підгруп товарів
        ERP Optima (Ogólne/Grupy), яке стане меню категорій в
        e-Sklep, у межах кореневої групи, визначеної в завданні
        T-2.3.1.

      performer: Консультант

      depends_on:
        - T-2.3.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dodawanie-towarow-w-erp-optima/

      result:
        - Узгоджена структура груп і підгруп товарів

      used_by:
        - T-5.2.2

      interview_checklist:
        - Яка структура категорій (груп і підгруп) має відображатися покупцям в e-Sklep?
        - У якому порядку мають розташовуватися категорії в меню?

      verification_checklist:
        - Перевірити, що структуру груп узгоджено із замовником і вона перебуває в межах кореневої групи, визначеної в T-2.3.1.

    - id: T-5.2.2
      name: Створити структуру груп товарів в ERP Optima

      description: >
        У розділі Ogólne/Grupy створити узгоджену структуру
        груп і підгруп товарів і віднести до кожної групи
        відповідні товари (група без товарів не буде видима
        в e-Sklep).

      performer: Консультант

      depends_on:
        - T-5.2.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dodawanie-towarow-w-erp-optima/

      result:
        - Створена в ERP Optima структура груп товарів із віднесеними товарами

      used_by:
        - T-5.5.1

      interview_checklist: []

      verification_checklist:
        - Перевірити, що створена структура груп відповідає узгодженій у T-5.2.1.
        - Перевірити, що кожна група, яка має бути видима в e-Sklep, містить принаймні один товар.

# ===================================================================
# WBS-5.3 Підготовка описів і мультимедіа
# ===================================================================

- wbs: WBS-5.3

  tasks:

    - id: T-5.3.1
      name: Підготувати назви, описи та фотографії товарів в ERP Optima

      description: >
        Заповнити на картках товарів в ERP Optima назви та
        описи, а також завантажити фотографії товарів (перша
        завантажена фотографія стає головною) для передачі в
        e-Sklep під час синхронізації.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/towary-w-panelu/

      result:
        - Заповнені назви, описи та завантажені фотографії товарів

      used_by:
        - T-5.5.1

      interview_checklist:
        - Чи готові тексти назв і описів для всіх товарів, що публікуються в e-Sklep?
        - Чи готові фотографії товарів, і яка фотографія має бути головною для кожного товару?

      verification_checklist:
        - Перевірити, що назви та описи заповнені для всіх узгоджених до публікації товарів.
        - Перевірити, що для кожного товару завантажено принаймні одну фотографію і головну фотографію обрано коректно.

# ===================================================================
# WBS-5.4 Підготовка атрибутів і даних
# ===================================================================

- wbs: WBS-5.4

  tasks:

    - id: T-5.4.1
      name: Узгодити перелік атрибутів товарів для e-Sklep

      description: >
        Узгодити із замовником перелік атрибутів товарів
        (наприклад, розмір, колір), які мають відображатися в
        e-Sklep, включно з форматом кожного атрибута (наприклад,
        список).

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dodawanie-towarow-w-erp-optima/

      result:
        - Узгоджений перелік атрибутів товарів та їх формати

      used_by:
        - T-5.4.2

      interview_checklist:
        - Які атрибути товарів (наприклад, розмір, колір, матеріал) мають відображатися покупцям в e-Sklep?
        - У якому форматі має відображатися кожен атрибут (список, діапазон значень тощо)?

      verification_checklist:
        - Перевірити, що перелік атрибутів та їх формати узгоджено із замовником.

    - id: T-5.4.2
      name: Створити атрибути в ERP Optima і увімкнути їх публікацію в e-Sklep

      description: >
        У розділі Ogólne/Atrybuty створити узгоджені атрибути
        (код, назву, формат), встановити ознаку "Udostępniaj w
        Comarch e-Sklep" для кожного атрибута і присвоїти значення
        атрибутів відповідним товарам.

      performer: Консультант

      depends_on:
        - T-5.4.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dodawanie-towarow-w-erp-optima/

      result:
        - Створені атрибути з присвоєними значеннями на картках товарів

      used_by:
        - T-5.5.1

      interview_checklist: []

      verification_checklist:
        - Перевірити, що створені атрибути відповідають узгодженому переліку в T-5.4.1.
        - Перевірити, що ознаку "Udostępniaj w Comarch e-Sklep" встановлено для всіх узгоджених атрибутів.
        - Перевірити, що значення атрибутів присвоєно відповідним товарам.

# ===================================================================
# WBS-5.5 Перша синхронізація даних
# ===================================================================

- wbs: WBS-5.5

  tasks:

    - id: T-5.5.1
      name: Виконати першу синхронізацію товарів з e-Sklep

      description: >
        В ERP Optima на вкладці Narzędzia запустити синхронізацію
        (іконка e-Handel), обрати магазин, встановити параметр
        "Wyślij wszystkie dane binarne" (для передачі фотографій
        товарів) і підтвердити синхронізацію іконкою "piorun".

      performer: Консультант

      depends_on:
        - T-5.1.2
        - T-5.2.2
        - T-5.3.1
        - T-5.4.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/pierwsza-synchronizacja/

      result:
        - Виконана перша синхронізація товарів, категорій, описів, фото та атрибутів

      used_by:
        - T-5.6.1

      interview_checklist: []

      verification_checklist:
        - Перевірити, що синхронізація завершилася без повідомлень про помилку.
        - Перевірити, що параметр "Wyślij wszystkie dane binarne" було позначено перед запуском синхронізації.

# ===================================================================
# WBS-5.6 Перевірка результатів синхронізації
# ===================================================================

- wbs: WBS-5.6

  tasks:

    - id: T-5.6.1
      name: Перевірити опубліковані товари та категорії в панелі адміністратора e-Sklep

      description: >
        У панелі адміністратора e-Sklep (розділ Sprzedaż/Towary)
        перевірити, що товари з'явилися з коректними назвами,
        описами, фотографіями, категоріями, цінами й
        атрибутами.

      performer: Консультант

      depends_on:
        - T-5.5.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/towary-w-panelu/

      result:
        - Підтверджена коректність опублікованих даних в e-Sklep

      used_by:
        - T-6.1.1

      interview_checklist: []

      verification_checklist:
        - Перевірити, що всі узгоджені товари відображаються в панелі адміністратора e-Sklep.
        - Перевірити, що категорії товарів відповідають узгодженій структурі (T-5.2.1).
        - Перевірити, що назви, описи та фотографії товарів відображаються коректно.
        - Перевірити, що атрибути товарів відображаються згідно з узгодженим переліком (T-5.4.1).
        - Перевірити, що ціни товарів відповідають типу ціни, узгодженому в T-2.2.1.
