milestone: M7
name: Презентація та приймання проєкту

tasks:

# ===================================================================
# WBS-7.1 Підготовка до презентації проєкту
# ===================================================================

- wbs: WBS-7.1

  tasks:

    - id: T-7.1.1
      name: Звести результати виконання M2–M6 для демонстрації

      description: >
        Зібрати підтверджені результати (verification_checklist)
        завдань milestones M2–M6, щоб переконатися, що ключові
        функції системи (інтеграція з ERP, магазин, дані, B2B,
        інтеграції) готові до демонстрації замовнику.

      performer: Консультант

      source:
        type: Internal Project Methodology

      result:
        - Зведений звіт про готовність системи до демонстрації

      used_by:
        - T-7.1.2

      interview_checklist: []

      verification_checklist:
        - Перевірити, що всі завдання M2–M6 закриті, а їх verification_checklist пройдено.
        - Перевірити, що відсутні незакриті критичні зауваження за попередніми етапами.

    - id: T-7.1.2
      name: Підготувати сценарій тестового замовлення для демонстрації

      description: >
        Підготувати сценарій тестового замовлення, що повторює реальний
        процес купівлі в e-Sklep (вибір товару, оформлення замовлення,
        підтвердження, синхронізація з ERP), згідно з документованим
        процесом оформлення замовлення.

      performer: Консультант

      depends_on:
        - T-7.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/jak-przebiega-proces-zamowienia/

      result:
        - Узгоджений сценарій тестового замовлення для демонстрації

      used_by:
        - WBS-7.2

      interview_checklist:
        - Які товари, способи оплати та доставки мають бути використані в демонстраційному замовленні?
        - Хто зі сторони замовника буде присутній на демонстрації?

      verification_checklist:
        - Перевірити, що сценарій охоплює оформлення замовлення, оплату та отримання сповіщень.
        - Перевірити, що сценарій узгоджено із замовником.

# ===================================================================
# WBS-7.2 Презентація рішення замовнику
# ===================================================================

- wbs: WBS-7.2

  tasks:

    - id: T-7.2.1
      name: Провести демонстрацію повного циклу замовлення замовнику

      description: >
        Провести для замовника демонстрацію e-Sklep за
        підготовленим сценарієм (T-7.1.2): оформлення тестового
        замовлення покупцем, підтвердження замовлення в панелі
        адміністратора, синхронізація замовлення з ERP Optima —
        згідно з документованим процесом оформлення замовлення.

      performer: Консультант

      depends_on:
        - T-7.1.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/jak-przebiega-proces-zamowienia/

      result:
        - Проведена демонстрація за участю замовника

      used_by:
        - T-7.2.2

      interview_checklist: []

      verification_checklist:
        - "Перевірити, що тестове замовлення пройшло повний цикл: оформлення → підтвердження → синхронізація з ERP."
        - Перевірити, що замовник підтвердив відповідність продемонстрованого функціоналу узгодженим вимогам (T-1.2.2).

    - id: T-7.2.2
      name: Зафіксувати зауваження та запитання замовника за підсумками демонстрації

      description: >
        Зафіксувати всі зауваження, запитання та побажання,
        висловлені замовником під час демонстрації, для
        подальшого опрацювання.

      performer: Консультант

      depends_on:
        - T-7.2.1

      source:
        type: Internal Project Methodology

      result:
        - Протокол зауважень за підсумками демонстрації

      used_by:
        - WBS-7.3

      interview_checklist:
        - Чи є у замовника зауваження до продемонстрованого функціоналу?
        - Чи є у замовника додаткові побажання, що не входять до узгодженої специфікації (T-1.5.2)?

      verification_checklist:
        - Перевірити, що всі зауваження замовника зафіксовано в протоколі.

# ===================================================================
# WBS-7.3 Опрацювання зауважень, виявлених на презентації
# ===================================================================

- wbs: WBS-7.3

  tasks:

    - id: T-7.3.1
      name: Усунути зауваження, що стосуються узгодженої специфікації проєкту

      description: >
        Усунути зауваження замовника (T-7.2.2), які стосуються
        робіт, узгоджених у специфікації проєкту (T-1.5.2),
        внісши необхідні зміни у відповідних завданнях
        M2–M6.

      performer: Консультант

      depends_on:
        - T-7.2.2

      source:
        type: Internal Project Methodology

      result:
        - Усунені зауваження, що стосуються узгодженої специфікації

      used_by:
        - T-7.4.1

      interview_checklist: []

      verification_checklist:
        - Перевірити, що кожне зауваження з протоколу (T-7.2.2), яке стосується специфікації, усунено.
        - Перевірити, що виправлення не порушили раніше пройдені verification_checklist відповідних завдань.

    - id: T-7.3.2
      name: Узгодити із замовником зауваження, що виходять за межі специфікації

      description: >
        Для зауважень і побажань замовника, що виходять за межі
        узгодженої специфікації проєкту (T-1.5.2), узгодити
        їх подальшу долю: окремий запит на зміну,
        наступний етап проєкту, або відхилення з обґрунтуванням.

      performer: Консультант

      depends_on:
        - T-7.2.2

      source:
        type: Internal Project Methodology

      result:
        - Узгоджене рішення щодо зауважень поза межами специфікації

      used_by:
        - T-7.4.1

      interview_checklist:
        - Чи погоджується замовник, що це зауваження виходить за межі затвердженої специфікації?
        - "Як замовник хоче вчинити з цим зауваженням: окремий запит на зміну, наступний етап, чи відмова?"

      verification_checklist:
        - Перевірити, що за кожним зауваженням поза межами специфікації зафіксовано узгоджене рішення.

# ===================================================================
# WBS-7.4 Приймання проєкту
# ===================================================================

- wbs: WBS-7.4

  tasks:

    - id: T-7.4.1
      name: Підготувати акт приймання проєкту

      description: >
        Підготувати акт приймання, що відображає виконані роботи за
        milestones M1–M6, усунені зауваження (T-7.3.1) і
        узгоджені рішення щодо зауважень поза специфікацією
        (T-7.3.2).

      performer: Консультант

      depends_on:
        - T-7.3.1
        - T-7.3.2

      source:
        type: Internal Project Methodology

      result:
        - Проєкт акта приймання

      used_by:
        - T-7.4.2

      interview_checklist: []

      verification_checklist:
        - Перевірити, що акт приймання відображає всі виконані milestones.
        - Перевірити, що в акті враховано рішення за всіма зауваженнями замовника.

    - id: T-7.4.2
      name: Підписати акт приймання проєкту замовником

      description: >
        Отримати підписаний замовником акт приймання проєкту,
        що підтверджує формальне завершення етапу впровадження.

      performer: Консультант

      depends_on:
        - T-7.4.1

      source:
        type: Internal Project Methodology

      result:
        - Підписаний акт приймання проєкту

      used_by:
        - T-8.1.1

      interview_checklist: []

      verification_checklist:
        - Перевірити, що акт приймання підписано уповноваженим представником замовника.
