milestone: M5
name: Подготовка данных

tasks:

# ===================================================================
# WBS-5.1 Подготовка товаров
# ===================================================================

- wbs: WBS-5.1

  tasks:

    - id: T-5.1.1
      name: Согласовать перечень товаров и параметры их публикации

      description: >
        Согласовать с заказчиком перечень товаров, которые должны
        быть опубликованы в e-Sklep, параметр "Status dostępności"
        (статус наличия) и способ определения "Cena i koszt
        dostawy" (по настройкам e-Sklep, по договорённости с
        клиентом, или фиксированной стоимостью) для товаров.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dodawanie-towarow-w-erp-optima/

      result:
        - Согласованный перечень товаров для публикации и параметры статуса/доставки

      used_by:
        - T-5.1.2

      interview_checklist:
        - Все ли товары компании должны публиковаться в e-Sklep, или только часть ассортимента?
        - Какой статус доступности должен отображаться для товаров (немедленная отправка, длительный срок ожидания и т.д.)?
        - "Каким способом должна определяться стоимость доставки товара: по настройкам e-Sklep, по договорённости с клиентом, или фиксированной суммой?"

      verification_checklist:
        - Проверить, что перечень товаров для публикации согласован с заказчиком.
        - Проверить, что для товаров определён статус доступности и способ расчёта стоимости доставки.

    - id: T-5.1.2
      name: Включить признак "Udostępniaj w Comarch e-Sklep/e-Sale" на карточках товаров

      description: >
        На карточках товаров (или с помощью операции серийных
        изменений) в ERP Optima установить признак "Udostępniaj w
        Comarch e-Sklep/e-Sale", заполнить "Status dostępności" и
        параметры "Cena i koszt dostawy" согласно решениям,
        согласованным в T-5.1.1.

      performer: Консультант

      depends_on:
        - T-5.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dodawanie-towarow-w-erp-optima/

      result:
        - Товары с установленным признаком публикации и заполненными параметрами доставки

      used_by:
        - T-5.5.1

      interview_checklist: []

      verification_checklist:
        - Проверить, что признак "Udostępniaj w Comarch e-Sklep/e-Sale" установлен для всех согласованных товаров.
        - Проверить, что статус доступности и способ расчёта стоимости доставки заполнены согласно решению T-5.1.1.

# ===================================================================
# WBS-5.2 Подготовка структуры каталога
# ===================================================================

- wbs: WBS-5.2

  tasks:

    - id: T-5.2.1
      name: Согласовать структуру групп товаров (дерево категорий) для e-Sklep

      description: >
        Согласовать с заказчиком дерево групп и подгрупп товаров
        ERP Optima (Ogólne/Grupy), которое станет меню категорий в
        e-Sklep, в границах корневой группы, определённой в задаче
        T-2.3.1.

      performer: Консультант

      depends_on:
        - T-2.3.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dodawanie-towarow-w-erp-optima/

      result:
        - Согласованная структура групп и подгрупп товаров

      used_by:
        - T-5.2.2

      interview_checklist:
        - Какая структура категорий (групп и подгрупп) должна отображаться покупателям в e-Sklep?
        - В каком порядке должны располагаться категории в меню?

      verification_checklist:
        - Проверить, что структура групп согласована с заказчиком и находится в границах корневой группы, определённой в T-2.3.1.

    - id: T-5.2.2
      name: Создать структуру групп товаров в ERP Optima

      description: >
        В разделе Ogólne/Grupy создать согласованную структуру
        групп и подгрупп товаров и отнести к каждой группе
        соответствующие товары (группа без товаров не будет видна
        в e-Sklep).

      performer: Консультант

      depends_on:
        - T-5.2.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dodawanie-towarow-w-erp-optima/

      result:
        - Созданная в ERP Optima структура групп товаров с отнесёнными товарами

      used_by:
        - T-5.5.1

      interview_checklist: []

      verification_checklist:
        - Проверить, что созданная структура групп соответствует согласованной в T-5.2.1.
        - Проверить, что каждая группа, которая должна быть видна в e-Sklep, содержит хотя бы один товар.

# ===================================================================
# WBS-5.3 Подготовка описаний и мультимедиа
# ===================================================================

- wbs: WBS-5.3

  tasks:

    - id: T-5.3.1
      name: Подготовить названия, описания и фотографии товаров в ERP Optima

      description: >
        Заполнить на карточках товаров в ERP Optima названия и
        описания, а также загрузить фотографии товаров (первая
        загруженная фотография становится главной) для передачи в
        e-Sklep при синхронизации.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/towary-w-panelu/

      result:
        - Заполненные названия, описания и загруженные фотографии товаров

      used_by:
        - T-5.5.1

      interview_checklist:
        - Готовы ли тексты названий и описаний для всех товаров, публикуемых в e-Sklep?
        - Готовы ли фотографии товаров, и какая фотография должна быть главной для каждого товара?

      verification_checklist:
        - Проверить, что названия и описания заполнены для всех согласованных к публикации товаров.
        - Проверить, что для каждого товара загружена хотя бы одна фотография и главная фотография выбрана корректно.

# ===================================================================
# WBS-5.4 Подготовка атрибутов и данных
# ===================================================================

- wbs: WBS-5.4

  tasks:

    - id: T-5.4.1
      name: Согласовать перечень атрибутов товаров для e-Sklep

      description: >
        Согласовать с заказчиком перечень атрибутов товаров
        (например, размер, цвет), которые должны отображаться в
        e-Sklep, включая формат каждого атрибута (например,
        список).

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dodawanie-towarow-w-erp-optima/

      result:
        - Согласованный перечень атрибутов товаров и их форматы

      used_by:
        - T-5.4.2

      interview_checklist:
        - Какие атрибуты товаров (например, размер, цвет, материал) должны отображаться покупателям в e-Sklep?
        - В каком формате должен отображаться каждый атрибут (список, диапазон значений и т.д.)?

      verification_checklist:
        - Проверить, что перечень атрибутов и их форматы согласованы с заказчиком.

    - id: T-5.4.2
      name: Создать атрибуты в ERP Optima и включить их публикацию в e-Sklep

      description: >
        В разделе Ogólne/Atrybuty создать согласованные атрибуты
        (код, название, формат), установить признак "Udostępniaj w
        Comarch e-Sklep" для каждого атрибута и присвоить значения
        атрибутов соответствующим товарам.

      performer: Консультант

      depends_on:
        - T-5.4.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dodawanie-towarow-w-erp-optima/

      result:
        - Созданные атрибуты с присвоенными значениями на карточках товаров

      used_by:
        - T-5.5.1

      interview_checklist: []

      verification_checklist:
        - Проверить, что созданные атрибуты соответствуют согласованному перечню в T-5.4.1.
        - Проверить, что признак "Udostępniaj w Comarch e-Sklep" установлен для всех согласованных атрибутов.
        - Проверить, что значения атрибутов присвоены соответствующим товарам.

# ===================================================================
# WBS-5.5 Первая синхронизация данных
# ===================================================================

- wbs: WBS-5.5

  tasks:

    - id: T-5.5.1
      name: Выполнить первую синхронизацию товаров с e-Sklep

      description: >
        В ERP Optima на вкладке Narzędzia запустить синхронизацию
        (иконка e-Handel), выбрать магазин, установить параметр
        "Wyślij wszystkie dane binarne" (для передачи фотографий
        товаров) и подтвердить синхронизацию иконкой "piorun".

      performer: Консультант

      depends_on:
        - T-5.1.2
        - T-5.2.2
        - T-5.3.1
        - T-5.4.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/pierwsza-synchronizacja/

      result:
        - Выполненная первая синхронизация товаров, категорий, описаний, фото и атрибутов

      used_by:
        - T-5.6.1

      interview_checklist: []

      verification_checklist:
        - Проверить, что синхронизация завершилась без сообщений об ошибке.
        - Проверить, что параметр "Wyślij wszystkie dane binarne" был отмечен перед запуском синхронизации.

# ===================================================================
# WBS-5.6 Проверка результатов синхронизации
# ===================================================================

- wbs: WBS-5.6

  tasks:

    - id: T-5.6.1
      name: Проверить опубликованные товары и категории в панели администратора e-Sklep

      description: >
        В панели администратора e-Sklep (раздел Sprzedaż/Towary)
        проверить, что товары появились с корректными названиями,
        описаниями, фотографиями, категориями, ценами и
        атрибутами.

      performer: Консультант

      depends_on:
        - T-5.5.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/towary-w-panelu/

      result:
        - Подтвержденная корректность опубликованных данных в e-Sklep

      used_by:
        - T-6.1.1

      interview_checklist: []

      verification_checklist:
        - Проверить, что все согласованные товары отображаются в панели администратора e-Sklep.
        - Проверить, что категории товаров соответствуют согласованной структуре (T-5.2.1).
        - Проверить, что названия, описания и фотографии товаров отображаются корректно.
        - Проверить, что атрибуты товаров отображаются согласно согласованному перечню (T-5.4.1).
        - Проверить, что цены товаров соответствуют типу цены, согласованному в T-2.2.1.
