milestone: M9
name: Запуск и гиперподдержка

tasks:

# ===================================================================
# WBS-9.1 Подготовка к запуску
# ===================================================================

- wbs: WBS-9.1

  tasks:

    - id: T-9.1.1
      name: Свести финальный чек-лист готовности магазина к запуску

      description: >
        Сверить результаты задач M2–M6 с разделами официального
        чек-листа "Lista czynności na start" (данные и логотип,
        почта, шаблон, товары, способы оплаты и доставки,
        регламент, домен), чтобы подтвердить, что все обязательные
        области панели администратора отмечены как настроенные.

      performer: Консультант

      depends_on:
        - T-7.4.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/lista-czynnosci-na-start/

      result:
        - Подтвержденная готовность всех обязательных разделов магазина к запуску

      used_by:
        - T-9.1.2

      interview_checklist: []

      verification_checklist:
        - Проверить, что все области из "Lista czynności na start" отмечены как настроенные в панели администратора.
        - Проверить, что ни одна обязательная область не осталась незаполненной.

    - id: T-9.1.2
      name: Перевести автоматическую синхронизацию из тестового режима в промышленный график

      description: >
        В ERP Optima в разделе System → Konfiguracja → Program →
        Automat synchronizacji → Harmonogramy включить параметр
        "Automatyczna synchronizacja z Comarch e-Sklep/e-Sale" и
        настроить часы и периодичность синхронизации для
        промышленной эксплуатации.

      performer: Консультант

      depends_on:
        - T-9.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026/dokumentacja/pytanie-34608-jak-odbywa-sie-synchronizacja-pomiedzy-comarch-erp-optima-a-comarch-e-sklep/

      result:
        - Настроенный промышленный график автоматической синхронизации

      used_by:
        - WBS-9.2

      interview_checklist:
        - С какой периодичностью и в какие часы должна выполняться автоматическая синхронизация в промышленном режиме?

      verification_checklist:
        - Проверить, что параметр "Automatyczna synchronizacja z Comarch e-Sklep/e-Sale" включен.
        - Проверить, что расписание синхронизации соответствует согласованному с заказчиком.

# ===================================================================
# WBS-9.2 Запуск в эксплуатацию
# ===================================================================

- wbs: WBS-9.2

  tasks:

    - id: T-9.2.1
      name: Выполнить контрольную синхронизацию перед открытием магазина для покупателей

      description: >
        Выполнить ручную синхронизацию с параметрами "Wyślij
        ofertę do e-Sklepu" и "Pobierz zamówienia z e-Sklepu"
        непосредственно перед началом промышленной эксплуатации,
        чтобы убедиться в отсутствии ошибок перед открытием
        магазина для покупателей.

      performer: Консультант

      depends_on:
        - T-9.1.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026/dokumentacja/pytanie-34608-jak-odbywa-sie-synchronizacja-pomiedzy-comarch-erp-optima-a-comarch-e-sklep/

      result:
        - Подтвержденная работоспособность синхронизации перед запуском

      used_by:
        - T-9.2.2

      interview_checklist: []

      verification_checklist:
        - Проверить, что синхронизация завершилась без сообщений об ошибке.
        - Проверить, что данные (товары, цены, остатки) в панели администратора актуальны.

    - id: T-9.2.2
      name: Объявить магазин доступным для покупателей

      description: >
        Зафиксировать дату и время официального открытия магазина
        для покупателей (промышленный запуск) и проинформировать
        об этом ответственных сотрудников заказчика.

      performer: Консультант

      depends_on:
        - T-9.2.1

      source:
        type: Internal Project Methodology

      result:
        - Зафиксированная дата запуска магазина в промышленную эксплуатацию

      used_by:
        - WBS-9.3

      interview_checklist: []

      verification_checklist:
        - Проверить, что дата и время запуска зафиксированы и доведены до ответственных сотрудников заказчика.

# ===================================================================
# WBS-9.3 Гиперподдержка
# ===================================================================

- wbs: WBS-9.3

  tasks:

    - id: T-9.3.1
      name: Определить период и порядок гиперподдержки

      description: >
        Согласовать с заказчиком продолжительность периода
        усиленной поддержки после запуска (гиперподдержки), а
        также порядок обращения к консультанту при возникновении
        проблем.

      performer: Консультант

      source:
        type: Internal Project Methodology

      result:
        - Согласованные период и порядок гиперподдержки

      used_by:
        - T-9.3.2

      interview_checklist:
        - Какова желаемая продолжительность периода гиперподдержки после запуска?
        - Каким образом заказчик должен обращаться к консультанту при возникновении проблем (e-mail, телефон, тикет-система)?

      verification_checklist:
        - Проверить, что период и порядок гиперподдержки согласованы с заказчиком.

    - id: T-9.3.2
      name: Отслеживать журнал событий синхронизации в период гиперподдержки

      description: >
        В течение согласованного периода гиперподдержки регулярно
        проверять журнал событий синхронизации (Ustawienia →
        Dziennik zdarzeń в панели администратора e-Sklep) и
        оперативно устранять возникающие ошибки синхронизации
        между ERP Optima и e-Sklep.

      performer: Консультант

      depends_on:
        - T-9.3.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/synchronizacja-comarch-e-sklep-z-systemami-comarch-erp-komunikaty/

      result:
        - Устраненные ошибки синхронизации, выявленные в период гиперподдержки

      used_by:
        - T-9.3.3

      interview_checklist: []

      verification_checklist:
        - Проверить, что журнал событий синхронизации проверялся с согласованной периодичностью.
        - Проверить, что все выявленные ошибки синхронизации устранены или переданы в Асисту Comarch при необходимости.

    - id: T-9.3.3
      name: Завершить период гиперподдержки

      description: >
        Подтвердить с заказчиком, что период гиперподдержки
        завершен, критичных нерешенных проблем не осталось, и
        заказчик готов к самостоятельной эксплуатации системы.

      performer: Консультант

      depends_on:
        - T-9.3.2

      source:
        type: Internal Project Methodology

      result:
        - Подтвержденное завершение периода гиперподдержки

      used_by:
        - WBS-9.4

      interview_checklist:
        - Остались ли у заказчика нерешенные проблемы после периода гиперподдержки?

      verification_checklist:
        - Проверить, что критичных нерешенных проблем не осталось.
        - Проверить, что заказчик подтвердил готовность к самостоятельной эксплуатации.

# ===================================================================
# WBS-9.4 Завершение проекта
# ===================================================================

- wbs: WBS-9.4

  tasks:

    - id: T-9.4.1
      name: Подготовить итоговый отчет по проекту

      description: >
        Подготовить итоговый отчет о выполненных milestones
        проекта (M1–M9), включая подписанный акт приемки (T-7.4.2)
        и результаты периода гиперподдержки (T-9.3.3).

      performer: Консультант

      depends_on:
        - T-9.3.3

      source:
        type: Internal Project Methodology

      result:
        - Итоговый отчет по проекту

      used_by:
        - T-9.4.2

      interview_checklist: []

      verification_checklist:
        - Проверить, что отчет отражает все выполненные milestones проекта.
        - Проверить, что в отчет включены результаты гиперподдержки.

    - id: T-9.4.2
      name: Формально закрыть проект

      description: >
        Провести формальное закрытие проекта: передать заказчику
        итоговый отчет и зафиксировать окончание договорных
        обязательств по внедрению.

      performer: Консультант

      depends_on:
        - T-9.4.1

      source:
        type: Internal Project Methodology

      result:
        - Формально закрытый проект

      used_by: []

      interview_checklist: []

      verification_checklist:
        - Проверить, что итоговый отчет передан заказчику.
        - Проверить, что окончание договорных обязательств зафиксировано.
