milestone: M9
name: Запуск і гіперпідтримка

tasks:

# ===================================================================
# WBS-9.1 Підготовка до запуску
# ===================================================================

- wbs: WBS-9.1

  tasks:

    - id: T-9.1.1
      name: Звести фінальний чек-лист готовності магазину до запуску

      description: >
        Звірити результати завдань M2–M6 з розділами офіційного
        чек-листа "Lista czynności na start" (дані та логотип,
        пошта, шаблон, товари, способи оплати та доставки,
        регламент, домен), щоб підтвердити, що всі обов'язкові
        області панелі адміністратора позначені як налаштовані.

      performer: Консультант

      depends_on:
        - T-7.4.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/lista-czynnosci-na-start/

      result:
        - Підтверджена готовність усіх обов'язкових розділів магазину до запуску

      used_by:
        - T-9.1.2

      interview_checklist: []

      verification_checklist:
        - Перевірити, що всі області з "Lista czynności na start" позначені як налаштовані в панелі адміністратора.
        - Перевірити, що жодна обов'язкова область не залишилася незаповненою.

    - id: T-9.1.2
      name: Перевести автоматичну синхронізацію з тестового режиму на промисловий графік

      description: >
        В ERP Optima в розділі System → Konfiguracja → Program →
        Automat synchronizacji → Harmonogramy увімкнути параметр
        "Automatyczna synchronizacja z Comarch e-Sklep/e-Sale" і
        налаштувати години та періодичність синхронізації для
        промислової експлуатації.

      performer: Консультант

      depends_on:
        - T-9.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026/dokumentacja/pytanie-34608-jak-odbywa-sie-synchronizacja-pomiedzy-comarch-erp-optima-a-comarch-e-sklep/

      result:
        - Налаштований промисловий графік автоматичної синхронізації

      used_by:
        - WBS-9.2

      interview_checklist:
        - З якою періодичністю та в які години має виконуватися автоматична синхронізація в промисловому режимі?

      verification_checklist:
        - Перевірити, що параметр "Automatyczna synchronizacja z Comarch e-Sklep/e-Sale" увімкнено.
        - Перевірити, що розклад синхронізації відповідає узгодженому із замовником.

# ===================================================================
# WBS-9.2 Запуск в експлуатацію
# ===================================================================

- wbs: WBS-9.2

  tasks:

    - id: T-9.2.1
      name: Виконати контрольну синхронізацію перед відкриттям магазину для покупців

      description: >
        Виконати ручну синхронізацію з параметрами "Wyślij
        ofertę do e-Sklepu" та "Pobierz zamówienia z e-Sklepu"
        безпосередньо перед початком промислової експлуатації,
        щоб переконатися у відсутності помилок перед відкриттям
        магазину для покупців.

      performer: Консультант

      depends_on:
        - T-9.1.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarch.pl/optima/pl/2026/dokumentacja/pytanie-34608-jak-odbywa-sie-synchronizacja-pomiedzy-comarch-erp-optima-a-comarch-e-sklep/

      result:
        - Підтверджена працездатність синхронізації перед запуском

      used_by:
        - T-9.2.2

      interview_checklist: []

      verification_checklist:
        - Перевірити, що синхронізація завершилася без повідомлень про помилку.
        - Перевірити, що дані (товари, ціни, залишки) в панелі адміністратора актуальні.

    - id: T-9.2.2
      name: Оголосити магазин доступним для покупців

      description: >
        Зафіксувати дату та час офіційного відкриття магазину
        для покупців (промисловий запуск) і поінформувати
        про це відповідальних співробітників замовника.

      performer: Консультант

      depends_on:
        - T-9.2.1

      source:
        type: Internal Project Methodology

      result:
        - Зафіксована дата запуску магазину в промислову експлуатацію

      used_by:
        - WBS-9.4

      interview_checklist: []

      verification_checklist:
        - Перевірити, що дату та час запуску зафіксовано і доведено до відповідальних співробітників замовника.

# ===================================================================
# WBS-9.4 Завершення проєкту
# ===================================================================

- wbs: WBS-9.4

  tasks:

    - id: T-9.4.1
      name: Підготувати підсумковий звіт за проєктом

      description: >
        Підготувати підсумковий звіт про виконані milestones
        проєкту (M1–M9), включно з підписаним актом приймання (T-7.4.2).

      performer: Консультант

      depends_on:
        - T-9.2.2

      source:
        type: Internal Project Methodology

      result:
        - Підсумковий звіт за проєктом

      used_by:
        - T-9.4.2

      interview_checklist: []

      verification_checklist:
        - Перевірити, що звіт відображає всі виконані milestones проєкту.

    - id: T-9.4.2
      name: Формально закрити проєкт

      description: >
        Провести формальне закриття проєкту: передати замовнику
        підсумковий звіт і зафіксувати завершення договірних
        зобов'язань з впровадження.

      performer: Консультант

      depends_on:
        - T-9.4.1

      source:
        type: Internal Project Methodology

      result:
        - Формально закритий проєкт

      used_by: []

      interview_checklist: []

      verification_checklist:
        - Перевірити, що підсумковий звіт передано замовнику.
        - Перевірити, що завершення договірних зобов'язань зафіксовано.
