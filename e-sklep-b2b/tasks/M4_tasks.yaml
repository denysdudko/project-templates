milestone: M4
name: Настройка e-Sklep

tasks:

# ===================================================================
# WBS-4.1 Настройка общих параметров магазина
# ===================================================================

- wbs: WBS-4.1

  tasks:

    - id: T-4.1.1
      name: Заполнить контактные данные и реквизиты магазина

      description: >
        В разделе Ustawienia → Ustawienia sklepu → Dane sklepu →
        Dane kontaktowe заполнить основные реквизиты продавца
        (название, сокращенное название, NIP, REGON, KRS/CEIDG,
        ведущая отрасль, почтовый адрес), контактные данные
        (телефоны, мессенджеры) и загрузить логотип магазина.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dane-sklepu/

      result:
        - Заполненные реквизиты, контактные данные и логотип магазина

      used_by:
        - T-4.1.2

      interview_checklist:
        - Какие реквизиты компании (название, NIP, REGON, KRS/CEIDG) должны быть указаны в магазине?
        - Какие контактные телефоны и мессенджеры должны отображаться для покупателей?
        - Есть ли готовый логотип магазина в формате PNG размером до 30 КБ и разрешением 200x200 px?

      verification_checklist:
        - Проверить, что реквизиты компании заполнены и сохранены без ошибок.
        - Проверить, что контактные данные отображаются корректно.
        - Проверить, что логотип загружен и отображается в панели администратора.

    - id: T-4.1.2
      name: Настроить языковые версии и валюты магазина

      description: >
        В разделе Dane sklepu → Języki выбрать языковые версии,
        доступные покупателям, и порядок их отображения; в разделе
        Dane sklepu → Waluty настроить отображение информации о
        валютах и курсах, получаемых из ERP.

      performer: Консультант

      depends_on:
        - T-4.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/dane-sklepu/

      result:
        - Настроенные языковые версии и отображение валют магазина

      used_by:
        - T-4.1.3

      interview_checklist:
        - Какие языковые версии магазина должны быть доступны покупателям?
        - В каком порядке должны отображаться языки в интерфейсе?

      verification_checklist:
        - Проверить, что включенные языковые версии соответствуют согласованным.
        - Проверить, что настройки валют соответствуют решению, принятому в задаче T-2.2.1 (M2).

    - id: T-4.1.3
      name: Настроить домен магазина

      description: >
        Направить основной домен магазина (или использовать
        бесплатный поддомен comarch-esklep.pl) на IP-адрес,
        указанный в панели администратора (Moje konto → Sklepy →
        Moje sklepy → Domeny), выполнив соответствующую A-запись
        у провайдера домена.

      performer: Консультант

      depends_on:
        - T-4.1.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/konfiguracja-domeny/

      result:
        - Настроенный и работающий домен магазина

      used_by:
        - T-9.1.1

      interview_checklist:
        - Заказчик использует собственный домен или бесплатный поддомен comarch-esklep.pl?
        - Кто на стороне заказчика отвечает за настройку DNS-записей у провайдера домена?

      verification_checklist:
        - Проверить, что домен направлен (A-запись) на IP-адрес, указанный в панели e-Sklep.
        - Проверить, что магазин открывается как по адресу с "www.", так и без него, если используются оба варианта.

# ===================================================================
# WBS-4.2 Настройка внешнего вида магазина
# ===================================================================

- wbs: WBS-4.2

  tasks:

    - id: T-4.2.1
      name: Согласовать графический шаблон магазина

      description: >
        Согласовать с заказчиком выбор графического шаблона:
        готовый шаблон Comarch (для B2B — Szafir или Rubin) либо
        создание индивидуального шаблона в Kreatorze wyglądu.

      performer: Консультант

      depends_on:
        - T-4.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/wybor-szablonu-startowego/

      result:
        - Согласованный графический шаблон магазина

      used_by:
        - T-4.2.2

      interview_checklist:
        - Заказчик хочет использовать готовый шаблон Comarch (Szafir/Rubin), или создать индивидуальный шаблон в Kreatorze wyglądu?
        - Если выбирается готовый шаблон — какая цветовая версия предпочтительна?

      verification_checklist:
        - Проверить, что выбор шаблона согласован и зафиксирован заказчиком.

    - id: T-4.2.2
      name: Установить или импортировать выбранный шаблон

      description: >
        Установить готовый шаблон Comarch через раздел Wygląd
        sklepu → Gotowe szablony Comarch, либо импортировать
        шаблон, подготовленный в Kreatorze wyglądu, через раздел
        Wygląd sklepu → Zaimportuj szablon z Kreatora wyglądu.

      performer: Консультант

      depends_on:
        - T-4.2.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/wybor-szablonu-startowego/

      result:
        - Установленный графический шаблон магазина

      used_by:
        - T-7.1.1

      interview_checklist: []

      verification_checklist:
        - Проверить, что шаблон установлен и отображается на витрине магазина без ошибок.
        - Проверить, что установленный шаблон соответствует согласованному в T-4.2.1, включая цветовую версию для готовых шаблонов.

# ===================================================================
# WBS-4.3 Настройка способов оплаты
# ===================================================================

- wbs: WBS-4.3

  tasks:

    - id: T-4.3.1
      name: Согласовать перечень способов оплаты и их реквизиты

      description: >
        Согласовать с заказчиком перечень активируемых способов
        оплаты на вкладке Ustawienia → Płatności i dostawy →
        Płatności: стандартные (Gotówka, Przelew (Przedpłata),
        On-line, Raty) и, при необходимости, дополнительные
        (Dodatkowa 1, Dodatkowa 2), включая реквизиты для оплаты
        "Przelew (Przedpłata)" (номер счета, данные банка, код
        SWIFT).

      performer: Консультант

      depends_on:
        - T-2.4.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/macierz-dostaw/

      result:
        - Согласованный перечень способов оплаты и их реквизиты

      used_by:
        - T-4.3.2

      interview_checklist:
        - Какие стандартные способы оплаты должны быть активны в магазине (Gotówka, Przelew, On-line, Raty)?
        - Нужны ли дополнительные способы оплаты (Dodatkowa 1, Dodatkowa 2), и что они собой представляют?
        - Если используется оплата "Przelew (Przedpłata)" — каковы номер счета, данные банка и код SWIFT для отображения покупателю?

      verification_checklist:
        - Проверить, что перечень способов оплаты согласован с заказчиком.
        - Проверить, что реквизиты для "Przelew (Przedpłata)" получены, если этот способ оплаты используется.

    - id: T-4.3.2
      name: Активировать способы оплаты в панели администратора

      description: >
        На вкладке Ustawienia → Płatności i dostawy → Płatności
        активировать согласованные способы оплаты и внести их
        реквизиты, включая данные для "Przelew (Przedpłata)".

      performer: Консультант

      depends_on:
        - T-4.3.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/macierz-dostaw/

      result:
        - Активированные и настроенные способы оплаты

      used_by:
        - T-4.4.2

      interview_checklist: []

      verification_checklist:
        - Проверить, что все согласованные способы оплаты активны в панели администратора.
        - Проверить, что реквизиты оплаты "Przelew (Przedpłata)" отображаются корректно.

# ===================================================================
# WBS-4.4 Настройка способов доставки
# ===================================================================

- wbs: WBS-4.4

  tasks:

    - id: T-4.4.1
      name: Согласовать страны/зоны доставки и способы доставки

      description: >
        Согласовать с заказчиком страны или зоны, в которые
        осуществляется доставка, а также перечень способов
        доставки для каждой страны/зоны, включая пункты
        самовывоза, если они используются.

      performer: Консультант

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/macierz-dostaw/

      result:
        - Согласованный перечень стран/зон и способов доставки

      used_by:
        - T-4.4.2

      interview_checklist:
        - В какие страны/зоны должна осуществляться доставка товаров?
        - Какие способы доставки должны быть доступны для каждой страны/зоны (курьер, почта, точки самовывоза, Paczkomaty InPost и т.д.)?
        - Используются ли пункты самовывоза, и если да — каковы их адреса?

      verification_checklist:
        - Проверить, что список стран/зон согласован с заказчиком.
        - Проверить, что для каждой страны/зоны определен хотя бы один способ доставки (обязательное требование системы).

    - id: T-4.4.2
      name: Настроить страны, способы доставки и стоимость доставки/оплаты

      description: >
        В разделе Ustawienia → Płatności i dostawy добавить и
        активировать согласованные страны/зоны (Dostępne kraje i
        strefy), создать для них ценник доставки (Cenniki dostaw),
        добавить способы доставки с указанием стоимости, срока
        доставки и условий бесплатной доставки, а также привязать
        к каждому способу доставки настроенные в T-4.3.2 способы
        оплаты с их стоимостью и сроком оплаты.

      performer: Консультант

      depends_on:
        - T-4.4.1
        - T-4.3.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/macierz-dostaw/

      result:
        - Настроенные страны, способы доставки, стоимость доставки и привязанные способы оплаты

      used_by:
        - T-7.1.1

      interview_checklist: []

      verification_checklist:
        - Проверить, что все согласованные страны/зоны активны и добавлены в ценник доставки.
        - Проверить, что для каждой страны/зоны настроен хотя бы один способ доставки со стоимостью и сроком доставки.
        - Проверить, что для каждого способа доставки привязан хотя бы один способ оплаты (обязательное требование системы).
        - Проверить условия бесплатной доставки/оплаты, если они были согласованы.

# ===================================================================
# WBS-4.5 Настройка уведомлений и параметров магазина
# ===================================================================

- wbs: WBS-4.5

  tasks:

    - id: T-4.5.1
      name: Настроить почтовый аккаунт для отправки писем из магазина

      description: >
        В разделе Ustawienia → Ustawienia sklepu → Dane sklepu →
        Ustawienia poczty настроить основной почтовый аккаунт для
        автоматической рассылки писем (SMTP-сервер, порт, логин,
        пароль), используемый для писем о заказах, регистрации и
        подписке на рассылку, и отправить тестовое письмо для
        проверки.

      performer: Консультант

      depends_on:
        - T-4.1.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/konfiguracja-konta-e-mail/

      result:
        - Настроенный и проверенный почтовый аккаунт для автоматических писем

      used_by:
        - T-4.5.2

      interview_checklist:
        - Какой почтовый ящик (адрес, SMTP-сервер, порт, логин, пароль) должен использоваться для автоматических писем из e-Sklep?
        - Используется ли шифрование SSL при подключении к SMTP-серверу?

      verification_checklist:
        - Проверить, что данные SMTP сохранены без ошибок.
        - Проверить, что тестовое письмо ("Wyślij wiadomość testową") успешно доставлено на адрес в другом домене.

    - id: T-4.5.2
      name: Настроить e-mail-уведомления для администраторов

      description: >
        В разделе Mój profil → Sklepy → Szczegóły wybranego
        e-Sklepu → Powiadomienia e-mail настроить, какие события
        (ошибка синхронизации с ERP, ошибка Comarch e-Sklep Sync,
        ошибка синхронизации заказов, истечение токена Allegro,
        отсутствие товара, новый клиент) должны генерировать
        уведомления, на какие адреса и с какой периодичностью.

      performer: Консультант

      depends_on:
        - T-4.5.1

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/powiadomienia-e-mail-dla-administratorow/

      result:
        - Настроенные e-mail-уведомления для администраторов

      used_by:
        - T-4.5.3

      interview_checklist:
        - Кто из сотрудников заказчика должен получать уведомления об ошибках синхронизации с ERP?
        - Нужно ли уведомление о новом клиенте, и включена ли ручная модерация регистрации ("Administrator musi zaakceptować konto")?
        - Нужно ли уведомление об отсутствии товара, и включен ли в магазине контроль остатков?
        - С какой периодичностью должны приходить уведомления по каждому типу событий?

      verification_checklist:
        - Проверить, что настроенные уведомления соответствуют согласованному перечню событий и адресатов.
        - Проверить, что периодичность уведомлений задана для каждого активного уведомления.
        - Проверить, что уведомление "Новый клиент" работает только при включенной ручной модерации регистрации, если это согласовано.

    - id: T-4.5.3
      name: Подготовить и опубликовать регламент (Regulamin) магазина

      description: >
        Подготовить текст регламента магазина с учетом обязательных
        информационных требований и отсутствия недопустимых
        оговорок (klauzule niedozwolone), и опубликовать его в
        разделе Ustawienia → Treści formalne → Regulamin i inne →
        Regulamin sklepu.

      performer: Консультант

      depends_on:
        - T-4.5.2

      source:
        type: Official Comarch Documentation
        url: https://pomoc.comarchesklep.pl/artykul/regulamin-e-sklepu/

      result:
        - Опубликованный регламент магазина

      used_by:
        - T-7.1.1

      interview_checklist:
        - У заказчика есть готовый юридически проверенный текст регламента магазина, или его нужно подготовить?
        - Кто на стороне заказчика отвечает за юридическую проверку регламента, в том числе на предмет запрещенных оговорок?

      verification_checklist:
        - Проверить, что регламент опубликован в панели администратора и доступен покупателям.
        - Проверить, что регламент содержит обязательные сведения (реквизиты продавца, условия возврата товара в течение 14 дней и др.).
