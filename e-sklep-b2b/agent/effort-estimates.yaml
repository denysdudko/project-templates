reference:
  id: effort-estimates
  name: Справочник базовых оценок трудозатрат по типу задачи
  version: "1.0"
  scope: >
    Оценки часов консультанта на выполнение одной Task заданного типа.
    Не относится к M1-M9 tasks.yaml — там оценок часов нет и не появляется;
    агент подбирает оценку по типу задачи из этого файла, а не придумывает
    её заново для каждой Task.
  source:
    type: Internal Project Methodology
    note: >
      Comarch не публикует нормативы трудозатрат на внедрение — оценки
      основаны на опыте консультантов (третий уровень иерархии источников
      истины, см. docs/principles.md), не на официальной документации.

# Как агент определяет тип конкретной Task
#
# В tasks/M*_tasks.yaml сейчас нет явного поля task_type (добавление такого
# поля меняет утверждённую структуру Task и вынесено как предложение v2 —
# см. v2_proposals ниже, файлы M1-M9 в этом проходе не меняются).
#
# До появления явного поля агент определяет тип по эвристике, в порядке
# приоритета:
#   1. Глагол в начале Task.name (см. keywords каждого типа).
#   2. Если глагол неоднозначен (например, "Подготовить..." даёт и
#      content_data_preparation, и synthesis_reporting) — по наличию и
#      характеру чек-листов: непустой interview_checklist с вопросами
#      выбора/решения → negotiation; отсутствие interview_checklist и
#      результат вида "отчёт/акт/сводка" из нескольких depends_on →
#      synthesis_reporting; результат вида "материалы/контент/данные
#      товаров" → content_data_preparation.
#   3. Если неоднозначность сохраняется — по WBS/milestone-контексту
#      (например, задачи внутри WBS-9.3 "Гиперподдержка" после первой —
#      support_monitoring, а не verification).
task_type_matching_rule: keyword-then-checklist-then-wbs-context

task_types:

  - id: interview
    name: Интервью с заказчиком
    definition: >
      Структурированный сбор требований или фактических данных от заказчика
      через interview_checklist; результат — заполненный чек-лист или отчёт
      по его итогам.
    keywords: ["Провести интервью", "Провести анализ"]
    base_estimate_hours: { min: 1, max: 2 }
    rationale: >
      Одна тематическая сессия с заказчиком (созвон/встреча) плюс фиксация
      ответов; трудозатраты не зависят от масштаба проекта, только от числа
      тем интервью в M1.
    examples: [T-1.1.1, T-1.2.1, T-1.3.1, T-1.4.1]

  - id: negotiation
    name: Согласование параметра/решения с заказчиком
    definition: >
      Согласование одного дискретного, уже суженного набора параметров или
      решения (не полноценное интервью по теме, а точечный выбор из
      вариантов, обычно в переписке или на коротком созвоне).
    keywords: ["Согласовать"]
    base_estimate_hours: { min: 0.5, max: 1 }
    rationale: >
      Более узкая по объёму, чем interview, задача — обсуждается конкретный
      параметр (валюта, склад, шаблон, способ оплаты), а не открытая тема.
    examples: [T-2.2.1, T-4.2.1, T-6.1.1, T-6.2.1, T-6.3.1]

  - id: configuration
    name: Настройка/конфигурация в ERP или панели администратора
    definition: >
      Внесение уже согласованных параметров в систему: заполнение форм,
      создание сущностей, включение опций, генерация ключей — техническая
      работа консультанта без диалога с заказчиком.
    keywords: ["Настроить", "Заполнить", "Создать", "Установить", "Включить",
      "Активировать", "Сгенерировать", "Сохранить", "Привязать", "Перевести"]
    base_estimate_hours: { min: 1, max: 3 }
    rationale: >
      Диапазон отражает разницу между простым действием (включить один
      параметр) и многошаговой формой (например, вкладка Ogólne в M3 с
      десятком полей).
    examples: [T-3.1.2, T-3.2.1, T-4.1.1, T-6.2.2, T-9.1.2]

  - id: content_data_preparation
    name: Подготовка контента и данных
    definition: >
      Создание или внесение объёма контента/данных, который масштабируется
      вместе с проектом (карточки товаров, фото, описания, атрибуты,
      обучающие материалы, текст регламента), а не разовая настройка одного
      параметра.
    keywords: ["Подготовить названия", "Подготовить материалы", "Подготовить и опубликовать",
      "Включить признак", "Создать структуру групп", "Создать атрибуты"]
    base_estimate_hours: { min: 4, max: 16 }
    rationale: >
      Базовый диапазон — на один проект среднего размера; фактический объём
      определяется масштабом каталога товаров, а не характером работы, и не
      может быть точно оценён без параметра объёма каталога на входе (см.
      v2_proposals — такого поля пока нет в agent/input-schema.json).
    examples: [T-5.1.2, T-5.2.2, T-5.3.1, T-5.4.2, T-4.5.3, T-8.1.2]

  - id: verification
    name: Проверка/тестирование результата
    definition: >
      Прогон verification_checklist после уже выполненной настройки,
      включая тестовые/контрольные синхронизации.
    keywords: ["Проверить", "Выполнить тестовую", "Выполнить контрольную"]
    base_estimate_hours: { min: 0.5, max: 2 }
    rationale: >
      Проверка по готовому чек-листу — быстрее, чем сама настройка; верхняя
      граница — для проверок с синхронизацией и ожиданием результата.
    examples: [T-2.1.1, T-3.3.1, T-5.6.1, T-6.3.4, T-9.2.1]

  - id: synthesis_reporting
    name: Сведение результатов и отчётность
    definition: >
      Агрегация результатов нескольких предыдущих Task в единый документ:
      отчёт, акт, сводка, подтверждение готовности к следующему этапу.
    keywords: ["Свести", "Подтвердить готовность", "Подготовить спецификацию",
      "Подготовить акт", "Подготовить итоговый отчет", "Уточнить перечень",
      "Подготовить перечень", "Подготовить описание"]
    base_estimate_hours: { min: 1, max: 3 }
    rationale: >
      Работа с уже существующими данными (из depends_on), не с заказчиком
      напрямую — трудозатраты пропорциональны числу сводимых результатов.
    examples: [T-1.1.2, T-2.4.3, T-3.3.2, T-7.1.1, T-7.4.1, T-9.4.1]

  - id: remediation
    name: Устранение замечаний
    definition: >
      Исправление конкретных замечаний или ошибок, выявленных на проверке
      или демонстрации; объём заранее не определён содержанием шаблона.
    keywords: ["Устранить"]
    base_estimate_hours: null
    rationale: >
      Фиксированной базовой ставки нет: объём работы зависит от содержания
      конкретных замечаний, а не от типа задачи. Оценивается резервом
      (buffer) при построении спринт-плана (Этап 5), не point-оценкой из
      этого справочника.
    examples: [T-7.3.1]

  - id: approval_signoff
    name: Формальное подтверждение/подпись
    definition: >
      Короткое административное действие: получить подпись/подтверждение
      заказчика, объявить событие, формально закрыть этап или проект.
    keywords: ["Подписать", "Объявить", "Закрыть", "Собрать подтверждение", "Завершить период"]
    base_estimate_hours: { min: 0.5, max: 0.5 }
    rationale: >
      Формальность, не содержательная работа консультанта — сама подготовка
      документа/материала уже оценена отдельной Task (synthesis_reporting
      или content_data_preparation).
    examples: [T-7.4.2, T-8.3.1, T-9.2.2, T-9.3.3, T-9.4.2]

  - id: session_delivery
    name: Проведение живой сессии
    definition: >
      Очная или онлайн-сессия с участием заказчика/пользователей:
      демонстрация системы, обучение, разбор сценариев, вопросы и ответы.
    keywords: ["Провести демонстрацию", "Провести презентацию", "Разобрать",
      "Ответить на вопросы"]
    base_estimate_hours: { min: 2, max: 4 }
    rationale: >
      Включает подготовку к сессии и её проведение; диапазон — от короткой
      Q&A-сессии до полноценной демонстрации/обучающего блока.
    examples: [T-7.2.1, T-8.2.1, T-8.2.2, T-8.2.3]

  - id: support_monitoring
    name: Периодический мониторинг и поддержка
    definition: >
      Не разовая задача, а погруженная нагрузка на протяжении согласованного
      периода (гиперподдержка): регулярная проверка журнала событий и
      оперативное устранение ошибок синхронизации.
    keywords: ["Отслеживать журнал"]
    base_estimate_hours: { min: 2, max: 4 }
    unit: часов в неделю на период гиперподдержки (не на Task целиком)
    rationale: >
      Оценивается как нагрузка в неделю, а не как фиксированная оценка на
      Task, так как длительность периода определяется T-9.3.1 индивидуально
      для проекта.
    examples: [T-9.3.2]

v2_proposals:
  - Добавить в схему Task (tasks/M*_tasks.yaml) явное поле task_type (enum
    по id из task_types выше) — устранит потребность в эвристике по
    ключевым словам и WBS-контексту. Меняет утверждённую структуру Task —
    не вносится текущей правкой.
  - Добавить в agent/input-schema.json поле, отражающее объём каталога
    (например, catalog_size_estimate), чтобы content_data_preparation можно
    было оценивать расчётно, а не диапазоном "на проект среднего размера".
    Меняет входной контракт — не вносится текущей правкой.
